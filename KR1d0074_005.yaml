body:
  text: 禮記訓義擇言卷五婺源江永撰内則子事父母雞初鳴咸盥潄按此記命士以上父子異宫者事親之禮即後文昧爽而朝之事服𤣥端而著韠搢笏士之服也若庶人則深衣而巳雞初鳴甚言其早其實適父母舅姑之所亦在昧爽之後朱文端公疑其有妨老人之安寢而終嵗行之亦恐以煩勞致疾讀者不可以辭害意此亦當知之先儒雖採此文入小學而不能使士庶之家皆通行禮過煩勞者難行也如曲禮所云冬温而夏凊昏定而晨省言簡而該此則家庭可常行者矣晨起之事皆詳獨不言靧後云五日則燂湯請浴三日具沐其間靣垢燂潘請靧是古人不於盥時洗靣又必煮淅米汁而靧之此古今人情之不同者也縰鄭注云縰韜髮者也孔疏云士冠禮云緇纚長六尺鄭云纚一幅長六尺足以韜髮而結之盧云所以裹髻承冠以全幅叠而用之未知孰是盧説為優陸氏徳明云黑繒韜髮按古人不露髮先以六尺之纚韜之而後結之為髻非以纚裹髻也疏謂盧説為優者未確文端公謂縰用布六尺叠之如帶以韜髮四周露其中為髻盖用盧説縰用緇繒非布也韠東滙陳氏云古者席地而坐以臨俎豆故設蔽膝以備濡漬按用韠之意鄭註乾鑿度得之見桓二年左傳疏陳氏此説亦是一義屨著綦鄭注綦屨繫也孔疏皇氏云屨頭施繫以為行戒未知然否或可著屨之時屨上自有繋以結於足也故鄭注士冠禮黑屨青絇云絇之言拘也以為行戒朱文端公云綦言著謂以綦著屨而繋之也或云絇非是按文端公説是陳氏集説因孔疏而誤衣紳東滙陳氏云𤣥端綃衣之上加紳帶士妻之服按婦人綃衣不可謂𤣥端衿纓長樂陳氏云男女事父母婦事舅姑皆有纓以佩容臭則與女子許嫁之纓不同許嫁乃纓未笄無所施既嫁夫脱之矣則事舅姑之衿纓非許嫁之纓也東滙陳氏云纓香囊也按二陳氏説是疑許嫁之纓繫之於首衿纓之纓繫之於身繫首所以示繫屬夫既脱則不復著繫身者所以為飾男女未冠笄及婦事舅姑皆衿之男既冠則不復衿也不有敬事不敢袒裼朱子曰尊長之前有敬事方敢袒裼敬事如習射之類射而袒裼乃為敬非有敬事而以勞倦袒裼則是不敬袒與裼皆禮之敬故非敬事云袒裼也按袒而有衣曰裼袒而無衣直謂之袒射禮言袒不言裼是袒而無衣者也裼又别時之事陳氏分袒裼為二更密凡袒裼皆是出左袖不嘯不指鄭氏云嘯讀為叱叱嫌有隠使也陳氏説見集説按陳氏謂叱亦有當發者嘯字讀本字此説是然謂嘯指聲容有異駭人視聴猶未盡當兼鄭氏嫌有隠使之意若飲食之雖不耆必甞而待加之衣服雖不欲必服而待按此皆勿逆父母舅姑之命之事應氏謂徐而待之則親知其果非所安而不可强陳氏謂俟尊者察其不耆不欲而改命皆太拘加之衣服而不欲謂若時已温而尊者猶使加衣衣未垢而尊者欲其易衣之類子放婦出而不表禮焉鄭注云猶為之隠不明其犯禮之過朱文端公云婦出而不明其罪何以服婦之父母不表禮者不表著放出之禮也放出之禮維何告之宗廟告之族黨鄰里曰是不足以承家放出之無使復不如是者冀其悔而不忍終絶也按文端公説是父母有婢子若庶子庶孫鄭注云婢子所通賤人之子按檀弓陳乾昔曰使吾二婢子夾我則婢子即婢也父母所愛之婢雖父母沒敬之不衰若婢子所生之子則庶子中兼之矣鄭注非是舅姑使冡婦母怠不友無禮於介婦朱子曰或疑友當為敢項氏曰言舅姑若行使冡婦冡婦母得以尊自怠而陵辱衆婦令其代巳也不友謂煩虐之無禮謂麾叱之怠也不友也無禮也三者皆以母字統之按當從項氏説舅姑若使介婦毋敢敵耦於冡婦劉氏云敵耦者欲求分任均勞之意按劉氏此説似可從而項氏通下三句言之云舅姑若使介婦亦不得恃舅姑之命而傲冡婦故毋敢敵耦不敢竝行竝命竝坐也當從之不敢竝命鄭注云命使令吴氏云謂冡婦所使令之人介婦不敢使令之按當從鄭氏吴氏説陳氏謂不敢竝受命於尊不敢竝出命於卑亦可通然亦當主出命言則必復請其故賜而后與之按吴氏以賜字為句陳氏以故字為句從陳氏可也子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也孔疏云子弟若有功徳被尊者歸遺衣服裘衾車馬則必獻其善者於宗子按孔疏是近世萬氏謂子弟指宗子之為子弟軰者獻其上又指宗子之尊於我者不可從既為大宗子無論長幼皆尊於族人何分等級其上若不指物而指人則其次説不通矣稰穛鄭注熟穫曰稰生穫曰穛陸氏曰稰熟穫若今晚稻穛生穫若今早稻故説文云稰糧也穛早熟也按陸氏説是若未熟而穫則不可食矣吴氏謂稷稻有此二種者亦得之芝栭按注疏芝栭是一物賀氏謂芝木椹栭軟棗恐不然芝栭盖菌類説文蕈桑䓴也栭䓴似是一字似栗之栭爾雅名栵夫婦之禮唯及七十同藏無間故妾雖老年未滿五十必與五日之御鄭注衰老無嫌吴氏曰上文言不敢藏於夫之箧笥盖謂年未七十者按詳上下文意盖謂有妻有妾媵者皆以次進御夫婦年未七十而妾猶未五十則妾御四日妻御一日如是則婦與夫不常同處而有間歇之夕至七十唯夫婦同處而妾皆不御也舊説謂衰老無嫌而吴氏連上文不敢藏於夫之篋笥言之與下文不貫似非經意國君世子生告於君接以太牢宰掌具三日卜士負之按此謂三日負子出寢門行射天地四方禮宰設太牢以接之重適也舊説讀接為㨗謂食其母使補虚强氣固未安王肅杜預謂以禮接夫人亦與接子不協陳氏謂接見其子固是而見字亦不確見子在三月之末適子庶子見於外寢鄭注外寢君燕寢也疏云適子謂太子之弟見於外寢庶子則見於外室但撫首咳名無辭之事與世子之弟同故與適子連文同云見於外寢其實庶子見於側室也知者下文公庶子生就側室三月之末擯者以其子見是也按適子庶子皆見於君之燕寢若側室者生子之所君尊當不於此見妾子下言公庶子生就側室謂妾於此生子耳若三月之末其母沐浴朝服見於君擯者以其子見自是就君之燕寢而見君所有賜君名之衆子則使有司名之按前言適子庶子見於外寢撫其首咳而名之是衆子皆君自名此又别記異聞也君所有賜謂君有特恩耳而疏謂偏所愛幸恐開嬖幸之門凡父在孫見於祖祖亦名之禮如子見父無辭鄭注父在則無辭有適子者無適孫與見庶子同父卒而有適孫則有辭與見冡子同父雖卒而庶孫猶無辭也應氏云辭者夫婦所以相授受也祖尊故有其禮而無其辭按當以注疏説為正應氏亦可備一説男鞶革女鞶絲鄭注鞶小囊並盛帨巾者男用韋女用繒長樂陳氏曰革帶大帶皆謂之鞶内則男鞶革革帶也左傳鞶厲大帶也易言鞶帶揚子言鞶帨許慎服䖍杜預皆以鞶為帶特鄭氏以鞶革為盛帨之囊按從陳氏説謂鞶為帶可也然幼時之帶當狹小學書計馬氏曰書文字也文言其形字言其法以其始於一二而生之至無窮故曰字按書古人謂之名秦漢以來乃謂之字字即名之變如人之有字也謂孳生無窮為字後人臆説非字之本義請肄簡諒鄭注諒信也請習簡謂所書篇數請習信謂習應對之言東滙陳氏云簡書篇數也諒言語信實也皆請於長者而習學之一説簡者簡要謂使人習事務從其要不為迂曲煩擾按幼者不能多授業又慮其不信以欺師故所請所肄欲其簡要而信實則記易堅習易熟而無虚偽以塞責者矣内而不出孔疏云藴蓄其徳在内不得為人謀慮東滙陳氏云藴蓄徳美於中而不自出以見其能按從陳氏説孫友視志東滙陳氏云孫友順交朋友也視志視其志意所尚也按孫友者謙孫不敢自矜然已有志尚視之於友則友可與切磋或有失則救正之子路曽晳諸人之言志所謂視志也視示同二十而嫁按三十而有室二十而嫁言其極不是過耳早嫁娶者禮固不禁凡男拜尚左手凡女拜尚右手按尚謂以一手覆於彼一手之上奔則為妾按不以禮聘為奔聘正妻而媵從之或買妾焉皆奔則為妾也媒氏中春之月令㑹男女於是時也奔者不禁謂貧乏不能備禮者權許之雖為妻亦若奔也玉藻天子玉藻十有二旒前後邃延鄭注天子以五采藻為旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩延冕上覆也按鄭氏謂冕前後皆垂旒非也東方朔云冕而前旒所以蔽明其説在漢儒之先若後旒安所取義禮器郊特牲及此文皆云十有二旒不云二十四旒鄭氏盖因此云前後邃延而誤前後邃延但謂前後之延自延端至冕武皆深邃不謂前後皆有旒也且一旒十二玉十二旒一百四十四玉巳繁重矣若復加十二旒有二百八十八玉其重當數觔恐首不能勝夫子何取乎周冕而服之乎此鄭説之不可不辨者聼朔於南門之外鄭注東門南門皆為國門也天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聼朔焉卒事反宿路寢亦如之按明堂别一制度不與宗廟路寢同制顧命在路寢有東房西房覲禮在廟有東箱皆非五室之制鄭荅趙商謂成王崩時在西都文武遷豐鎬作靈臺辟廱而巳其餘猶諸侯制度周公攝政制禮作樂乃立明堂於王城愚按汲冡周書作雒解云乃位五宫太廟宗宫考宫路寢明堂是洛邑有明堂矣謂西都未作明堂則可謂宗廟路寢如明堂制則不可五飲上水漿酒醴酏按此五飲以薄厚為次水無味而為諸味之本故上之漿者酢酨窨米水為之酒者泲去糟醴則和糟者也酏粥也周禮六飲水漿醴凉醫酏此分醴為二而無凉醫内則亦無凉醫而有醷濫所記各不同也史定墨鄭注視兆坼也疏云凡卜必以墨畫龜求其吉兆若卜從墨而兆廣謂之卜從吴氏云墨謂既坼之後以墨塗之坼大者食墨粲然可見坼㣲者墨不能入故但占其坼而巳按周禮卜師揚火以作龜致其墨鄭注云致其墨者孰灼之明其兆又占人史占墨卜人占坼注云墨兆廣也坼兆舋也墨大坼明則逢吉是墨者火灼所裂之兆非先以墨畫而後灼也兆之體不常安能必其如人所畫如此則卜之能從者鮮矣疏説非是吴氏謂先坼而後墨姑備一説君子之居恒當戸鄭注鄉明按曲禮為人子者居不主奥謂父在時若非父在則室中當居奥室中有牖以為明户不恒開豈恒居之以嚮明冬月風寒當户而坐亦非謹疾之道此謂君子在堂上恒居東序下當房户而西鄉也不當户牖間者户牖前南鄉賓客之位非恒坐之處也房户恒闔揖私朝煇如也登車則有光矣疏云煇光儀也東滙陳氏云煇與光皆言徳容發越之盛光則又盛於煇也吴氏云煇如謂昧爽之際晨光猶熹微有光謂質明之時晨光又顯著按吴氏説是煇如即詩夜鄉晨庭燎有煇也天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也鄭注此亦笏也謂之珽珽之言珽然無所詘也或謂之大圭陸氏云珽非大圭大圭長三尺此長二尺六寸王執鎮圭搢大圭以祀天朝日饗先王執冒搢珽以朝羣臣見諸侯諸侯稱荼大夫不得謂笏為荼故曰天子御珽諸侯御荼大夫御笏按珽非大圭陸氏説是管子有服玉笏以朝日之文固笏之插帶有似於大圭故以大圭為玉笏耳詘對直言謂其形㣲曲諸侯惟曲其上大夫并曲其下後世笏作彎形正是前詘後詘之制鄭以殺其旁為詘亦非是登席不由前為躐席鄭注升必由下也陸氏釋文云為於偽反本又如字疏云失節而踐為躐席應從下升若由前升是躐席也東滙陳氏云八字當作一句而為字平聲盖行禮時人各一席而相離稍逺固可從下而升若布席稍密或數人共一席則必須由前乃可得巳之坐若不由前則是躐席矣朱文端公云躐踐也謂不踐前席席以前為正也按釋文為字存兩讀似陳氏之説古人巳有之當以於偽反之讀為是此但論一人之席之升法未論數人同坐一席也若同坐一席由後升亦不得由前讀書食則齊豆去席尺疏云讀書聲當聞尊者食為其汙席坐則近前與席畔齊豆去席尺者解席所以近前之意謂豆去席一尺不得不前坐就豆或云人頭臨豆與豆齊故云齊豆按當從前説以齊字為句曲禮所謂食坐盡前也豆去席尺言設豆去席之法非解所以近前之意飯飲而俟鄭注飯飲利將食也按此飲謂將食飲水以利㗋飯者飲與食皆可言之文端公謂飯畢亦飲而俟君飱未確二爵而言言斯禮已三爵而油油以退按注疏讀斯字為句又以禮已三爵而油油為一句文勢似有未安或可如王肅説言讀如字二爵而言謂可以語也言斯禮巳謂語必以私也居冠屬武自天子下逹有事然後緌鄭注居冠謂燕居冠也著冠於武少威儀燕居無事者去飾疏云燕居之冠屬武於冠冠武相連屬燕居率略少威儀故也又不加緌若非燕居則冠與武别臨著乃合之有儀飾故也按吉冠内畢冠向武外屈入武内縫之非燕居則冠與武别臨著乃合盖冠卷本為一條有兩端著時以一端貫入前畢合於後畢之内有紐結之然則纓與武亦當别既屬武然後屬纓也若冠卷先作圜形以冠來合之則内畢之制臨時始縫恐制度不如此然愚猶疑冠與武不可别作冠時無分禮冠居冠皆當縫合之所謂居冠屬武者對下有事然後緌而言謂居冠但結其纓使武與首著而纓短不更垂緌非居冠乃用垂緌之纓也𤣥冠紫緌自魯桓公始也鄭注盖僣宋王者之後服也緌當用素按此盖尚紫之漸也管子云齊桓公好服紫齊人尚之五素而易一紫又戰國策云齊紫敗素也而價十倍春秋之末衛渾良夫紫衣狐裘太子數其罪而殺之謂紫衣僭君服也然則紫之奪朱其來有漸夫子所以惡之雖䙝服亦不用也衽當旁鄭注衽謂裳幅所交裂也凡衽者或殺而下或殺而上是以小要取名焉衽屬衣則垂而放之屬裳則縫之以合前後上下相變按深衣之裳用布六幅裁為十二幅四幅正裁為八當裳之前後二幅邪裁為四當裳之旁雖十二幅皆為裳而當旁者名衽餘幅不名衽也鄭注云衽謂裳幅所交裂也玩所之一字明惟衽交裂他幅則皆正裁孔疏不逹鄭㫖誤謂毎幅交解之濶頭廣尺二寸向下狹頭廣六寸向上是十二幅皆得名衽何為衽當旁乎且十二幅無正形以聖賢法服反為竒衺不正之服後世深衣裳之誤自孔氏始凡衽者皆以揜裳際得名喪服之衽殺而下左右各二尺五寸叠作燕尾之形屬於衣垂而放之朝祭服亦當然深衣長衣之衽殺而上屬於裳縫之以合前後縫者惟身之左旁深衣篇謂之續衽右旁不可合别有鉤邊屬於衽漢世謂之曲衽此經未之及也衽有殺下殺上之異故棺上合縫之木名為小要者上半殺而下下半殺而上亦得衽之名鄭注是以小要取名焉謂棺上合縫之衽也疏引皇氏熊氏解鄭注凡衽者以下皇謂殺而下者為喪服熊謂殺而下者朝祭之服各指一隅相兼乃備皆得鄭注之意但失不以小要為棺上合縫木耳而孔氏反駁之謂今删定深衣之上獨得衽名不應假他餘服相對為衽何以知之深衣衣下屬幅而下裳下屬幅而上相對為衽此又大失鄭注之意皆由不識衽為在裳旁故也愚别有深衣考誤一卷詳之又攷諸經傳言衽者孔子曰㣲管仲吾其被髮左衽盖中國裳衽縫其左旁以左掩右衽之不合者在右邊夷服之衽縫其右旁以右掩左衽之不合者在左邊也問喪云親始死雞斯徒跣扱上衽謂以裳兩角上插於帶也詩采采芣苢薄言袺之薄言襭之爾雅云執衽謂之袺扱衽謂之襭盖芣苢貯於裳中執其裳之兩角又插之於帶也輈人云終嵗御衣衽不敝盖輈不和則車不安御者裳之兩旁裳掉動而易敝輈和則無此患也左傳清沸魋助長魚矯殺三卻抽戈結衽而偽訟者亦是以裳之兩角結之於帶為鬭訟之狀也凡此皆衽當旁之驗也左傳昭公衰衽如故衰是喪服之衽公羊傳齊侯唁公於野井國髙致糗而昭公以衽受乃是朝服之衽耳近世又有謂布六幅萬充宗説以三幅正裁為六在裳之前後以三幅邪裁為六在裳之兩旁而别有衽屬於衣裳之正裁者屬於衣裳之邪裁者屬於衽此説雖稍破孔疏六幅皆交解之謬而以三幅邪裁亦無謂衽當旁即是裳幅之在旁者而謂别有衽屬於衣亦無稽皆由不肯細研鄭注又未通考諸經傳之言衽者耳振絺綌不入公門表裘不入公門鄭注振讀為袗襌也表裘外衣也二者形且䙝皆當表之乃出疏云形解袗絺綌其形露見䙝解表裘在外可鄙䙝二者皆上加表衣乃出也按論語袗絺綌必表而出之先儒皆謂絺綌外有衣朱子易之先著裏衣表絺綌而出之於外與此處亦不相妨盖燕居時或可絺綌在表入公門必更有朝服在表也表裘外衣謂裘外無裼衣又無上服襲裘不入公門鄭注衣裘必當裼也疏云裘上有裼衣裼衣之上有襲衣襲衣之上有正服但據露裼衣不露裼衣為異耳按裘外有裼衣裼衣外有上服開前衿袒出左袖露裼衣謂之裼不袒左袖則謂之襲事親以質為敬故不有敬事不敢袒裼事君以文為敬故襲裘不入公門言入公門必袒左袖露裼衣也是以下經鄭注云袒而有衣曰裼聘禮注云凡袒裼者左孔疏謂裼襲但據露裼衣不露裼衣為異盖疏已詳於曲禮執玉條彼疏云掩而不開謂之襲開皮弁及中衣左袒出其裼衣謂之裼其説已分明矣但謂裼衣外更有中衣為襲衣疑不然耳而吴氏不詳考古人左袒之禮謂直其領而露出裼衣為裼曲其領而掩蔽裼衣為襲後人大約祖其説未有能通考羣經確依注疏解裼襲者甚矣禮學之難明而易晦也君衣狐白裘錦衣以裼之鄭注君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩曰衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服與凡裼衣象裘色也按以帛裹布非禮而皮弁之内得有錦衣者程慄也云錦衣非全用錦也盖中衣之縁耳婦人衣錦褧衣亦然此説是君子狐青裘豹褎𤣥綃衣以裼之鄭注君子大夫士也綃綺屬也染之以𤣥於狐青裘相宜狐青裘盖𤣥衣之裘疏云六冕皆有裘此云𤣥謂六冕及爵弁也則天子諸侯皆然而云大夫士者君用純狐青大夫士雜以豹褎按熊氏説是疏引皇氏説謂𤣥衣為𤣥端非也禮不以帛裏布服之襲也充美也鄭注充猶覆也所敬不主於君則襲疏云凡敬有二體一則父也二則君也父是天性至極以質為敬故子於父母之所不敢袒裼君非血屬以文為敬故臣於君則裼若平敵以下則亦襲以其質略也所襲雖同其意異也聘禮行聘致君命亦襲者彼是聘享相對聘質而享文欲文質相變故裼襲不同也按疏説得之後人泥於詩之襢裼暴虎孟子之袒裼裸裎曲禮之勞毋袒謂袒裼皆不敬之容臣於君前豈反以是為敬不知言非一端各有所當平居而袒裼則不恭也行禮則不然故曰不有敬事不敢袒裼又曰周旋裼襲禮之文也又曰裼襲之不相因也欲民之毋相瀆也古人之重裼襲如此凡禮經言裼者左袒而有衣也單言袒者左免衣肉袒也喪禮肉袒祭禮迎牲割牲養老禮割牲皆肉袒射禮惟君袒朱襦餘皆肉袒而以拾韜左臂君在大夫射則肉袒覲禮侯氏請事右肉袒謂刑宜施於右臣於君前且有肉袒之時而又何疑於裼乎古禮不合今人情甚多如喪祭之肉袒今人必不肯行而古人反以是為敬又如食飯以手食醬以指脱屨而燕臣見君而解韈此類豈可以今人之情臆斷其無此事哉大夫以魚須文竹士竹本象可也鄭注文猶飾也大夫士飾竹以為笏不敢與君並用純物也疏云魚須文竹庾氏云以鮫魚須飾竹以成文士竹本象可也者以竹為本質以象牙飾其邊縁陳氏曰竹堅有節以魚須飾之卑者不敢用純也竹本尤堅故士笏用焉象諸侯所以為笏者也大夫近尊其勢屈士逺尊其勢伸故士飾笏用焉或謂竹本象者以象飾其本誤矣陸氏曰竹有節而巳大夫則又有文焉士以竹本為正若或用象亦許故曰象可也按疏以本為本質陳氏以為竹之本當從陳説象可也不言以象文者蒙上文也若純用象恐太僭君陸氏説未必然小功不説笏當事免則説之鄭注免悲哀哭踊之時不在於記事也小功輕不當事可以搢笏也按笏者朝祭吉服之飾尊卑皆用之臣則因之以記事君不於笏記事而亦搢笏可知設笏非専為記事也子事父母亦搢笏以其服𤣥端也若燕居服深衣當亦不搢笏矣而況於喪服乎小功不説笏盖承上文見於天子與射而言謂臣有輕喪服在君所不説笏也若在家服小功服雖不當事不免豈可以笏施於凶服乎不唯小功而巳雖緦麻亦無搢笏之理笏度二尺有六寸其中博三寸其殺六分而去一鄭注殺猶杼也天子杼上終葵首諸侯不終葵首大夫士又杼其下首廣二寸半新安王氏曰大圭其長三尺此言笏其度二尺有六寸則不得為大圭況大圭天子服之非臣下所得用笏則自天子諸侯至大夫士皆有之其非大圭明矣鄭乃以考工記大圭之制為笏且記但言其殺六分去一又安知天子諸侯殺其上首大夫士殺其下首乎中博三寸則上下皆殺也下殺便於搢插上殺便於操執而搢之也何謂天子杼上終葵首諸侯不終葵首大夫士杼其下首乎按王氏説是但當云上殺是便於搢下殺是便於執耳鄭氏之誤不唯以珽笏為大圭而又以此經之殺釋前經之詘殺者殺其旁詘者曲其身豈可混而一之哉又按笏者常搢而不執唯有指畫於君前及記事於君前暫出之用畢仍搢之疏中每云執笏盖習於後世執手板之儀而不知其非也圜殺直天子直公侯前後方大夫前方後挫角士前後正鄭注圜殺直自韠制天子四角直無圜殺公侯殺四角使之方變於天子也所殺者去上下各五寸大夫圜其上角變於君也韠以下為前上為後士賤與君同不嫌也正直方之間語也天子之士則直諸侯之士則方臨川吴氏曰韠之制長三尺上廣一尺下廣二尺天子自上之左右角廣一尺處斜裁至下之左右角廣二尺處盡其所裁一直而無所屈故曰直諸侯自上之左右角正裁而下至五寸止止處亦廣一尺自下之左右角正裁而上至五寸止止處亦廣二尺又就上五寸之下廣一尺處斜裁至下五寸之上廣二尺處止上下各有五寸皆不斜裁故方大夫自下之左右角正裁而上至五寸止止處廣二尺就此廣處左右皆斜裁之至上左右角廣一尺處盡其上端之左右及左右之兩邊各剡一寸去其兩角其下端裁方與諸侯同上端不裁方但剡其兩角而巳故圜士之下端左右角亦裁方上至五寸而止止處二尺亦就止處斜裁至上端廣一尺處盡如大夫但不剡圜二角盖後直而前方故曰前後正按吴説詳明鄭注殺四角使之方當亦如吴説孔疏謂以物補飾之使方恐失鄭意韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸按韠之制上有肩次有頸頸為正身横度之為廣直度之為博頸五寸者廣五寸也博二寸者直度濶二寸也頸不言長亦如肩之二寸也肩不言廣亦如正身上邊之一尺也右徴角左宫羽鄭注玉聲所中也徴角在右事也民也可以勞宫羽在左君也物也宜逸臨川吴氏曰林鐘為徴隂聲之首故居右而角與徴近故以徴配角黄鐘為宫陽聲之始故居左而羽與宫近故以羽配宫無商聲者周樂不用商調也按吴氏説亦善若以聲調之位言之徴角在兩端者居右宫羽在中間者居左也君在不佩玉左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵韠鄭注謂世子也出所處而君在焉則去徳佩而設事佩辟徳而示即事也結其左者若於事有未能也結者結其綬不使鳴焉居謂所處而君不在焉朝於君亦結左朱文端公云注出字對下居字所處謂所到處明非在朝也言不佩玉則佩器可知矣左結右設俱謂事佩世子有代君之嫌不惟不敢言徳即事亦未敢謂盡能勝任也居平居不在君前時設佩無不設也若公朝盡去徳佩非所以肅觀瞻故徳與事兼設而結其左焉設者為朝結者為君也結謂徳與事皆結齊亦然按文端公説與疏異似得鄭注之意注謂結其綬不使鳴謂觿燧之屬不結亦有聲非謂不使玉鳴也君賜車馬乘以拜賜衣服服以拜賜注讀拜字句山隂陸氏曰拜賜句按當從陸氏讀禮不盛服不充故大裘不裼疏云郊禮盛服大裘則無别衣裼之是不見美也按不裼謂不袒露裼衣即襲也疏説誤君與尸行接武大夫繼武士中武徐趨皆用是鄭注尊者尚徐蹈平迹繼武迹相及也中武迹間容迹徐趨大夫士之徐行也皆與尸行之迹也朱文端公曰君行與尸行皆接武尸尊故與君同大夫以下位愈卑行愈速也按一舉足為武接武繼武中武皆即已之武迹言之尊者行歩狹而徐卑者行步濶而速也文端公説得之舊説謂君大夫士與尸行者誤未入廟尸猶是臣尸或出必乘車君與臣未有與之行於道路者也若在廟中迎尸延尸送尸皆祝之事君不與之行祝之迎送尸也必前導之而行出户過主人降階及門祝皆嚮尸儀節詳士虞禮亦不得有繼武中武之行步立容徳鄭注如有予也按注説未安朱文端公云儼然有徳氣象也盛氣顛實揚休臨川吴氏云休當為喣氣之充於體如陽之蒸煦按謂氣充實於體揚其休美於外如云充實而有光輝大夫私事使私人擯則稱名鄭注私事使謂以君命私行非聘也若魯成公時晉侯使韓穿來言汶陽之田歸之於齊之類清江劉氏曰注説是也此謂若趙襄子使楚隆弔吴夫差之類私臣於君命不得言主故名之楚隆之辭曰寡君之老無恤使陪臣隆敢展謝之此則稱君者也按當從劉氏説下文大夫有所往必與公士為賓不得用私人擯也明堂位昔者周公朝諸侯於明堂之位臨川吴氏曰周公營洛邑㑹侯甸男采衛五服之諸侯以㑹三公之禮見周公而巳無周公代王受諸侯朝之禮記言周公朝諸侯於明堂之位盖是周公制作時定此朝位天子謂王也舊註謂周公攝王位朝諸侯非也按從吴氏説庫門天子皋門雉門天子應門疏云其餘諸侯有皋門應門及路門按此言魯之庫門雉門儗天子之皋門應門耳非謂唯魯有庫門雉門而諸侯不得立也説見檀弓刮楹逹鄉鄭注每室八窻為四逹按每室八窻者明堂之制也廟堂未必如此魯公之廟文世室也武公之廟武世室也新安王氏曰周公為魯太祖而開國實為魯公其廟不毁不可援文王為此若武公毁廟復立季氏為之也豈可比之武世室乎按王氏説是夏后氏之龍簨虡殷之崇牙周之璧翣鄭注周又畫繒為翣戴以璧垂五采羽於其下樹於簨之角上按璧翣喪葬之飾豈可施之於樂器此因後文殷之崇牙周之璧翣而誤也璧翣當作樹羽盖以五采羽樹於簨之角非縣於璧翣之下陳氏祥道云喪禮旌旗之飾亦有崇牙棺牆之飾亦有璧翣與簨虡同者為欲使人勿惡也此因誤文而强解耳然則崇牙亦用之何也曰崇牙本旌旗之飾猶虞之緌夏之綢練吉時旌旗亦用之簨業上刻為牙以縣鐘磬之紘有似於旗上之牙本不為嫌若璧翣者周人特設之為障柩之飾記與棺牆蔞重諸物竝言皆是凶器吉時王出行節服氏維大常旅賁執戈盾夾車條狼執鞭夾道未見有持璧翣為儀衛者簨上無取於障飾何故以送喪之凶物畫於其上崇牙樹羽頌有明文謂璧翣上垂羽自是後人彌縫之説徒言璧翣何以知其有樹羽記人亦不當如此屬辭也經文有誤先儒破讀者多矣此句獨未有疑者何也有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋鄭注皆黍稷器制之異同未聞吴氏曰兩四六八漸増其數也方氏曰兩敦黍稷四璉黍稷稻粱六瑚黍稷稻粱麥苽八簋黍稷稻梁白黍黄粱稰穛吴氏曰簋盛黍稷其盛稻粱名簠按吴氏説是陸氏言及於數非其實方氏説亦可取有虞氏祭首夏后氏祭心殷祭肝周祭肺方氏曰虞尚用氣祭首氣之陽也三代各祭其所勝夏尚黒勝赤故祭心殷尚白勝青故祭肝周尚赤勝白故祭肺按方氏可備一説周之璧翣鄭注天子八翣皆戴璧垂羽按此因前誤文之璧翣合於周頌之樹羽意其亦有垂羽非也禮記訓義擇言卷五
