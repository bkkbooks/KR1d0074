body:
  text: 禮記訓義擇言卷七婺源江永撰大傳大夫士有大事省於其君干祫及其髙祖鄭注大事寇戎之事也善於其君謂免於大難也干猶空也空祫謂無廟祫祭之於壇墠東滙陳氏云大事謂祫祭也大夫士不敢私自舉行必省問於君而君賜之乃得行而其祫也亦上及於髙祖干者自下干上之義以卑者而行尊者之禮故謂之干吳氏云大事大功也省察也省察如詩序所謂有功而見知也祫合也謂雖無廟而得於有廟者合祭也大夫蓋祫於曽祖廟而上及髙祖上士則祫於祖廟而上及曽祖髙祖中士下士則祫於禰廟而上及曽祖髙祖也大夫亦有有大祖廟者無曽祖廟當祫於大祖之廟而祭曽祖祖禰凡四世若大祖在髙祖前者或祫於大祖廟而并及髙曽祖禰凡五世也趙氏曰干者逆上之意言逆上及髙祖也按大事與省字之訓舊注可從省訓善出爾雅吳氏說亦可兼存陳氏說非也干祫及其髙祖吳氏說詳備孔疏亦引師說云大夫有始祖者鬼其百世若有善於君得祫則亦祫與大祖廟中遍祫大祖以下也干字之義從趙氏可也追王大王亶父王季歷文王昌不以卑臨尊也東萊吕氏云不以卑臨尊此出於後儒之說非追王之本意也大王王季文王乃武王之祖父其尊孰大於是曷為待追王而後尊哉追王者何意蓋三王皆肇基之主所以追王之也朱文端公云不以卑臨尊信後世無稽之論然子孫之身即祖父之身子孫之爵即祖父之爵武王之為天子天命之大王王季文王之王亦天王之也若云以王業由興之故追王以酬功是等祖父於望散諸臣也尊親之義固如是乎按吕氏之說得之追王非以酬功而文端公謂等於望散諸臣恐推之太過三王之王固天王之然天非有言亦以義理斷之耳追王止於大王而不能上及組紺以上是即天也五曰存愛鄭注存察也愛有仁愛也陳氏云人於其所親愛而辟焉有以察之則所愛者一出於公而四者皆無私意之纍矣吳氏云存愛謂仁民上言民不與此言存愛蓋存愛民之心爾先有不忍人之心而後有不忍人之政也按存愛之義吳氏得之舊注及陳氏說非是其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也吳氏云治親之目有四總言之均謂之親分言之則親親者在下子孫之親尊尊者在上父祖之親長長者在旁昆弟之親男女有别者在內夫婦之親也按此通言不可與民變革者四事則尊尊謂貴貴也前言上治祖禰尊尊下治子孫親親與此文本不連而吳氏移屬於此節之下謂上治祖禰為復釋尊尊下治子孫為復釋親親旁治昆弟合族以食序以昭穆為復釋長長别之以禮義為復釋男女有别恐屬牽合别之以禮義謂以禮義别其親疏隆殺詳文勢固不可屬之男女則此兩章何可牽合下文服術有六吳氏亦必屬之四親此吳氏之蔽也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎名者人治之大者也可無慎乎東滙陳氏云父之兄弟為伯叔父則其妻謂之伯叔母兄弟之子為從子則其妻謂之婦此於昭穆為宜弟之妻不可謂婦猶兄之妻不可謂之母以紊昭穆也舊說弟妻可婦婦不可母失其指矣按喪服傳亦有此文彼釋夫之昆弟何以無服意謂弟妻不可謂婦猶兄嫂不可謂母兄弟之妻於母於婦皆無所屬是以不為制服以逺之而今人皆謂弟妻為婦則當為制婦之服同於子婦豈兄妻亦可為制母之服而同於伯叔母乎是皆不可也舊說謂弟妻為婦者卑逺之使下同於子妻則本無婦名假其子妻同推而逺之與本文意不協陳氏駁之者是傳意似謂兄之妻尊之而為嫂弟之妻但當謂弟之妻不可謂之婦猶兄弟之子但當謂兄之子弟之子不可謂之姪也譏時人稱弟婦亂名實之失也服術有六一曰親親二曰尊尊三曰名四曰出入五曰長幼六曰從服鄭注親親父母為首尊尊君為首名世母叔母之屬也出入女子子嫁者及在室者長幼成人及殤也從服若夫為妻之父母妻為夫之黨服孔疏云出入若女子子在室為入適人為出及出繼為人後者也按此經前五術當從注疏說親親謂父母妻子孫伯叔昆弟凡以三為五以五為九者皆在其中尊尊謂臣民為君又若以尊而厭降或同尊而不降名謂伯母叔母及子婦出入謂女子子在室出嫁及為人後者長幼謂成人與三殤蓋此經通言服術故須該制服之義而吳氏泥於上文謂親親為子孫尊尊為祖父名與出入為男女長幼為昆弟以下治子孫者居第一非次也尊尊不謂君臣出入不兼為人後長幼不謂三殤則制服之義不全何足以盡服術乎吳氏固守其說謂注疏以尊尊為君服矣此篇專言治親制服之正意此吳氏之蔽也有徒從鄭注臣為君之黨孔疏云鄭亦略舉一條妻為夫之君妾為女君之黨庶子為君母之親子為母之君母並是也按吳氏釋徒從但舉子為母之君母庶子為君母之親妾為女君之黨而不及臣為君之黨妻為夫之君則徒從之類不具而從服亦不全矣自義率祖順而下之至於禰名曰重一輕一重其義然也鄭注云用恩則父母重而祖輕用義則祖重而父母輕疏云義主斷制用義循祖順而下之至於禰其義漸輕祖則義重故名曰重也義則祖重而父母輕仁則父母重而祖輕一輕一重宜合如是故云其義然也按注疏說是輔氏應氏方氏吳氏皆以重為父輕為祖則仁與義無異何以分為二類乎義之所以重祖觀末章親親故尊祖尊祖故敬宗云云可見本不以喪服論也如别子為祖繼别為宗大宗百世不遷是重祖也又推而極之天子有大禘之祭既有始祖又推始祖所自出亦是重祖之至亦是以義推之安得謂皆為禰重但注又謂恩重者為之三年義重者為之齊衰仍就喪服言之恐未是齊衰三月何能敵斬衰三年之重注又訓自為用亦非自當訓由族人不得以其戚戚君位也按從石梁王氏說位也自為句可也有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也朱文端公云有小宗而無大宗者君無同母弟使庶長弟與諸庶弟為宗至其子則各自為宗故有小宗而無大宗然所貴乎收族者大宗也周公為文王别子魯公為繼别之宗凡蔣邢茅宗之管蔡成霍亦宗之邗晋應韓亦宗之至春秋戰國周女嫁於諸侯猶魯為之主滕定公之喪父兄百官曰吾宗國魯先君亦莫之行是魯之所係於周者非淺鮮矣假如武王無同母弟周公亦庶子是周無大宗矣孰與主王姬之嫁而為同姓諸侯取則乎且所以不令為大宗者為其為庶子也假如大宗子無適子庶子將不繼為大宗乎又使君無適子將不以庶子為君乎君之庶可為君大宗之庶可繼為大宗而謂别子非適遂不可為大宗乎喪服傳云如何而可為之後同宗則可為之後謂士大夫家始祖不可無祀故大宗不可絶而為之後也若無大宗則士大夫之始祖不其餒乎或曰此言繼世之君之公子所謂一君一大宗者如莊公之弟慶父與叔牙季友為宗非若魯為周同姓大宗也孔疏亦云如繼别之大宗非正大宗也吳文正錯看注疏乃云兄弟不相宗至其子乃為宗果爾則繼禰之宗又謂之何惟一君一大宗故無適即不立大宗以有先君之大宗故也此說近是然一君一大宗則是吾宗之外又有宗矣未聞武穆成昭舍魯而别有大宗也按文端公之說固辨矣考之經傳似未合此記所謂宗者皆以士大夫之家言之不謂諸侯亦有宗也成王封周公於魯留相周公使伯禽就國周公實魯國之君不可謂之别子魯公既為君則亦非繼别之宗滕謂魯為宗國以其同出文王假士大夫之宗法言之未必諸姬皆以魯為大宗而自為小宗也使諸姬皆為小宗則始封之君亦將五世而遷乎謂凡蔣邢茅宗魯猶可也謂管蔡成霍亦宗之邗晉應韓亦宗之管叔為周公之兄邗晉應韓為武之穆安得皆宗魯乎春秋時王姬歸於齊使魯主昏蓋魯近齊故也非謂周女下嫁皆以魯為主也喪服大宗子死族人為之齊衰三月如魯果為大宗則魯君薨諸姬皆服齊衰三月乎故宗法不可施於諸侯魯非大宗之比也又謂士大夫家始祖不可無祀若無大宗則士大夫之始祖不其餒乎此亦未然大宗所以統領族人非止存始祖之祀也古者士大夫廟有定制大夫得立三廟始為大夫如季友者固當為太祖矣若别子是士自他國來為始祖其子孫雖為大宗豈能越二廟一廟之制世世祀之為始祖乎後世始祖立祠禮以義起古禮未有此也又謂莊公之弟慶父與叔牙季友為宗亦恐考之未詳慶父者莊公之庶兄非弟也季友者莊公同母弟以正法言之庶當宗嫡慶父叔牙皆當宗季友豈有庶反為嫡宗者乎又按此一節則公子之為大宗者必是適其小宗者必是庶也然有大宗而無小宗與無宗亦莫之宗亦謂公子生存則然耳傳之子孫則無小宗者亦必有小宗矣無宗而莫之宗者如此公子是適則後世以為大宗之祖如是庶則後世以為小宗之祖矣唯有小宗而無大宗者其後世世無大宗亦不以他族之大宗為宗文端公則因滕謂魯為宗國一語多生枝節耳少儀聞始見君子辭曰某固願聞名於將命者不得階主敵者曰某固願見朱文端公云固願猶云實實願也階所由進也主謂司賔客之人不得階主者謂主賓客之人為之引進也按不得階主舊說謂不得指斥主人文端公之說甚新亦甚確按士相見禮請見之辭云某也願見無由達某子以命命某見今云不得階主謂不得引進之人即無由達之意也彼云某子以命命某見是巳得階主之辭某子即階主也此則無階主而自請見之辭如儀封人之請見夫子是以云不得階主也由此推之若夷之之因徐辟趙良之因孟蘭臯皆階主也適有喪者曰比孔疏云比謂比方其年力以給喪事陳氏云喪不主相見來欲比方於執事之人朱文端公云比讀去聲喪凶事非素親愛誰肯與之按陳氏說似優而文端公之說亦可兼存受立授立不坐性之直者則有之矣東滙陳氏云此皆委曲以盡禮之當然耳然直情徑行之人亦或有跪者按當從陳氏說謂巳坐人立受授皆當起坐而受授則倨矣直情徑行者則有之君子不為也即席曰可矣吳氏云謂賓主可登席也按吳氏說是擯者言此以為登席之節也有尊長在則否按尊長在室則少者脫屨於户外曲禮曰户外有二屨是也尊長在堂則少者脫屨於階下之側曲禮曰侍坐於長者屨不上於堂是也不疑在躬不度民械不願於大家不訾重器按四句各為一事文端公以不疑在躬連下三句解之恐非是度民械願大家訾重器皆以在人者言之則在躬亦謂他人之躬疑者擬議之意謂不擬議人在躬之善否如子貢方人之類械者器之總名大傳曰異器械是也舊注以械為兵器陳氏謂不可度其利鈍非是不度民械者不度人家器用之多少也訾亦度也不訾重器文端公謂不度其器之貴賤輕重者得之陳氏以訾為鄙毁非是不二問問卜筮曰義與志與義則可問志則否按吳氏移不二問在志則否之下文端公從之愚謂經文不可輕改疑不二問之上或脫卜筮二字不二問者卜筮不可瀆也孔疏謂太卜問來卜筮者若是公義則可為卜筮若所問是私意則不為卜筮此以義則可為句陳氏謂見人卜筮欲問其所卜何事則曰義與志與義者事之冝為志則心之隱謀故義者則可問其事志則不可問其事此以義則可問為句二說皆可通而陳氏說尤善此與問品味不彰人之癖問道藝不斥人之短相類皆言辭之禮也勝則洗而以請客亦如之按朱子云此皆是卑者與尊者為耦若巳勝而司射命酌則不使他弟子酌酒以罰尊者必自洗爵而請行觴若耦勝則亦不敢煩他弟子酌而飲已必自洗爵而請自飲也注疏說恐非是陳氏注猶用舊說非也師役曰罷鄭注云罷之言罷勞也朱子云易曰或鼓或罷與史記將軍罷休就食之罷亦同按當從朱子說事君者量而后入不入而后量鄭注云量量其事意合成否孔疏云先商量事意堪合成否然后入而請之不得先入請見君然後與之同量成否東滙陳氏云先度其君之可事而后事之則道可行而身不辱入而后量則有不勝其輕進之悔者矣按陳氏說固美矣然與下文無怨而下遠罪若不相屬從注疏說可也不旁狎不道舊故朱子云旁泛及也泛與人狎習不恭敬也不道舊故舊事既非今日所急且或揚人宿過以取憎惡故也按當從朱子說諫而無驕朱文端公云驕矜也凡敢言者意氣慷慨多失於驕矜汲長孺冦萊公亦時有此病按文端公說甚善毋拔來毋報往鄭注云報讀為赴疾之赴拔赴皆疾也人來往所之當有宿漸不可卒也按此謂往來進退當紆徐不可急疾而來急疾而去也當從鄭注若朱子語恐非定說朱子語見集說晚年修通亦只用鄭注也母測未至按凡事之未來者皆不可億測陳氏謂君子以誠自處亦以誠待人不逆料其將然其說恐未該士依於德游於藝工依於法游於說按藝者德之末說者法之意也如考工記所論皆說也工人常游心焉則巧由是出矣不必謂常法之外别有說也毋訾衣服成器按訾亦度也人之衣服成器不可度其所直也婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜按此經似可疑鄭氏謂婦人以肅拜為正凶事乃手拜然則昏禮奠菜於廟亦是吉事何以不言肅拜而言扱地乎孔疏謂昏禮拜扱地以其新來盡禮於舅姑然則拜君賜亦至重豈可以肅拜受之竊疑婦人吉事雖有君賜肅此肅拜當為手拜經文誤耳手拜即扱地之拜言雖有君賜手拜者謂不如男子之稽首也為喪主則不手拜鄭氏有二說前說謂為夫與長子當稽顙其餘亦手拜此說是後引或說喪為主則不手拜肅拜孔氏謂違小記文其義非也取俎進俎不坐鄭注云以其有足亦柄尺之類孔疏云案管子書弟子職云進柄尺謂爵豆之類按弟子職云柄尺不跪孔疏引舊文誤劔則啓櫝蓋襲之加夫襓與劔焉按進劔之儀此與曲禮有詳略此言有櫝有襓而曲禮所言者徒以劔進人者也軍尚左卒尚右按鄭注云左將軍為上貴不敗績而老子云吉事尚左凶事尚右偏將軍居左上將軍居石言以喪禮處之與此不同蓋當時制度有異各以所見言之以傳考之楚人雖尚左而邲戰以前乘廣先右田于孟諸宋公為右盂鄭伯為左盂魯與齊戰孟孺子泄為上將軍帥右師冉求為偏將軍帥左師皆如老子之說尊者居右軍旅思險隱情以虞東滙陳氏云當隱密巳情以虞度彼之情計按軍事尤當慎密故宜隱情以虞當從陳氏說客爵居左其飲居右介爵酢爵僎爵皆居右按其飲謂飲爵也當從舊說若如文端公說則經文復叠而賓當飲之爵不見矣又賓與僎南面以西為右若介在西階上東面則以南為右主人在阼階上西面則以北為右而文端公謂爵皆居西亦誤凡齊執之以右居之於左孔疏云齊謂以鹽梅齊和之法執此鹽梅以右手居處羮食於左手之上以右手所執鹽梅調和正之於事便也按此言設齊之法謂執鹽梅以右手而設之於羮器之左方此左右皆據設齊者言之於設者為左則於食者為右故食羮者得於右取鹽梅以調為便也舊說謂居羮食於左手者非是祭左右軌范乃飲按軓軌軹三字轉寫易訛軹又作􅛓尤易訛為軌此處文誤當以周禮大馭正之左右軌即大馭之兩軹范即大馭之軓軓本軹字之訛而鄭注云軌與軹同為轊頭是與轂末同名誤矣孔氏於詩疏謂少儀軌字誤當為軹是也此疏不正其誤而引詩又從毛氏作軌則疏矣古人所以祭左右軹者祭兩輪也祭前軌者祭輈也皆欲其無傾敗也凡羞有俎者則於俎內祭孔疏云羞在豆則祭於豆間俎於人為橫不得祭於俎間故於俎內祭朱文端公云折俎燔肉皆取祭庶羞不便於取故於俎內祭按食庶羞在無算爵時其時俎巳徹矣若食正羞則羞卑而俎尊豈可以羞物祭於俎從舊說為是羞者進食物之通名尊者以酌者之左為上尊尊壺者面其鼻按尊盛醴則特之無上下尊盛酒必有偶如有𤣥酒則𤣥酒尊為上或兩尊皆酒亦必以一尊為上設尊之人皆以酌者之左為上尊如燕禮設尊於東楹西南北列之以南為上酌者在尊東西面𤣥酒在酌者之左也鄉飲酒禮設尊於房户間則𤣥酒在西酌者北面亦是在酌者之左也其餘設尊皆然以鄉飲設尊推之燕禮設尊之人亦當是向尊之面立於尊東而孔疏謂設尊者在尊西嚮東以右為上設者之右為酌者之左於經無據又但引燕禮而不及其他說亦未備也壺有鼻以鼻為面如燕禮東楹西之尊鼻向東鄉飲酒禮房户間之尊鼻向南若燕禮尊士旅食於門西則鼻向北方氏謂面其鼻示專惠非也專惠唯燕禮堂上尊面向君為然若房户間之尊與賓主夾之面向南則非專惠矣飲酒者禨者醮者有折俎不坐按飲酒者謂凡燕飲也孔氏謂目下禨醮者非是沐而飲冠而醮禮盛則有折俎其有折俎者取祭反之不坐燔亦如之尸則坐朱文端公云若云俎有足故立取則尸何以坐意折骨與燔所設者盛故立而取反也按當從文端公說洗盥執食飲者勿氣有問焉則辟咡而對東滙陳氏云奉進洗盥之水於尊者及執食飲以進之時皆不可使口氣直衝尊者若此時尊者有問則偏其口而對按此經當從陳氏說謂氣為口氣乃與下句一貫禮記訓義擇言卷七
