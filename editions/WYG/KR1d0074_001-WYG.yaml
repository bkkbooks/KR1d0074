body:
  text: 禮記訓義擇言卷一婺源江永撰曲禮上很毋求勝分毋求多草廬吴氏引鄭氏曰求多為傷平也按鄭注為傷平也總解毋求勝毋求多盖與人䦧争必求勝亦是傷平吴氏引舊注増求多二字専釋下一句非也立如齊按齊嚴敬貌如齊者正立自定不跛不倚儀禮所謂疑立是也禮不妄説人不辭費朱子云禮有常度不可為媚以求説於人辭逹則止不貴於多按當從朱子説不妄説人若孟子不與王驩言不辭費若冠禮祝辭昬禮戒女及主賓之辭祝嘏之辭皆不尚多也禮不踰節不侵侮不好狎按踰節則招辱未確當云踰節則無度道徳仁義非禮不成教訓正俗非禮不備按共由者為道同得者為徳仁與義其大目也非禮則仁義無節文而道徳亦為虚位此論其理如此未論人之所以修身下文亦無分承之意宦學事師非禮不親鄭注宦仕也疏引熊氏云宦謂學仕宦之事學謂習六藝左傳趙盾見靈輒餓問之云宦三年矣服䖍云宦學也是學職事為宦也吴氏云宦學猶言游學也有事師之禮然後師友之情親按注疏分仕學為二事陳氏集説從之未當當從吴文正之説班朝治軍涖官行法非禮威嚴不行按班朝治軍涖官行法孔疏陳氏皆分為四事吴氏謂班朝治軍涖官三者各有其法似皆未安愚謂二句分三事涖官行法言當官而行法令也是故聖人作為禮以教人按樂記聖人作為父子君臣以為紀綱與此句文勢正相似宜作一句讀作字勿絶句大上貴徳其次務施報禮尚往來孔疏云三皇五帝時淳厚不尚往來之禮所貴在徳徳主施但施而不希其反三王之時施則望報以為常事故其禮主尚往來按古初人心淳厚渾忘施報之名後王制禮則因人情之常施報務其相稱是以有交際往來之禮往不來來不往有施而無報皆非禮也孔疏得之但不當以三皇五帝三王時為限耳百年日期頤呂氏云人生以百年為期故曰期朱子云期當音居宜反論語期可巳矣與朞字同周帀之義也期謂百年已周頤謂養而已期如上句㓜弱耄悼等字頤如上句學冠不刑等字按當從朱子説自稱曰老夫於其國則稱名吕氏云老夫長老之稱巳國稱名父母之邦不敢以尊者自居也朱文端公云於他國曰老夫不自有其貴也本國稱名并不自言老也按二説當兼存之夫為人子者三賜不及車馬鄭注三賜三命也凡仕者一命而受爵再命而受衣服三命而受車馬車馬而身所以尊者備矣卿大夫之子不受不敢以成尊比踰於父天子諸侯之子不受自卑逺於君朱子云左氏傳魯叔孫豹聘於王王賜之路豹以上卿無路而不敢乘疑此不及車馬亦謂受之而不敢用耳若天子之賜又爵秩所當得豈容獨辭而不受耶按此言為人子者父在時三命為大夫而父未得爵命不敢受尊物以踰於父也君雖賜之臣必固辭之如固辭不獲命亦受之而弗敢乘辭者禮之經也受而不用者禮之權也此經但論人子孝敬不敢踰父之初心言經而未及權是以第云不及車馬故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交逰稱其信也按三賜不及車馬非實有孝敬之心者不能即此一事而孝行已著諸徳亦皆備矣州閭鄉黨非親非友故以稱孝屬之所逰必有常所習必有業陳氏云逰有常身不他往也習有業心不他用也按陳氏説簡而當恒言不稱老按孔疏引或説云子若自稱老父母則甚老恐感動其心此説得之陳氏云古人所以斑衣娱戯者欲安父母之心也此説亦善祭祀不為尸鄭注尸尊者之處為其失子道然則尸卜筮無父者按祭者子行安能必得無父者但非主祭者之子則可矣父母存不許友以死鄭注死為報仇讐呂氏云許者許其託先儒謂許報仇雖父母沒亦不可患難相死兄弟之道也朋友以義相成患難之事無相及戰國游俠以氣相許結私交報仇怨君子謂之不義也按不許友以死坊記所謂父母在不敢有其身也朋友亦有患難相死之道非謂若聶政之為謂友有危難忘身救之或冒險脱友於阨如李篤之匿張儉或犯顔雪友之寃如左儒之争杜伯固有激於義而為之者矣父母在恐危親故不許舊説以為報仇者固非呂氏曲避報仇之説謂許者許其託然經文曰不許友以死不曰不許友於死則此説亦非確訓負劔辟咡詔之按古人常帶劔於脅亦或帶之於背拔劔則俯身而出之如荆軻傳秦王劔長不能拔左右呼曰王負劔此負劔或即荆軻傳之負劔謂長者俯身與之語如負劔之狀也如此則負劔與辟咡相對負劔俯其身辟咡偏其口或亦可通毋踖席鄭注升席必由下也孔疏云將就坐當從下而升當巳位上不發初從上也玉藻不由前為躐席與此别朱子云此是衆人共坐一席既云當己位上即須立於席後乃得當巳位上盖以前為上後為下也正與玉藻義同鄉飲乃是特設賓席一人之坐故以西為下而自席下之中升而即席與此異也陳氏云踖猶躐也玉藻曰登席不由前為躐席是登席當由前也按注疏之誤朱子正之陳氏亦引玉藻乃謂登席當由前與朱子立於席後之説相反盖玉藻登席不由前為躐席為字本讀去聲為躐席者釋上所以不由前之故也陳氏以如字讀之謂不由前即為躐席是以登席當由前其説誤矣客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入鄭注為猶敷也固辭又讓先入肅進也進客謂道之按主人復出迎客不言與客讓入客何為固辭且主人道客亦宜也何必待客固辭而後入士相見禮主人出迎客一揖即入無讓入固辭之文竊疑主人請入為席然後出迎客者主人道其意於客也其辭若曰某當先入為席敬逆吾子云爾客固辭者辭其請入為席也主人因客固辭而止遂肅客入實未甞入為席也先儒以固辭為又讓先入者誤矣然則士相見何以無請入為席之禮曰彼是初見之客授贄即出堂上不坐故不為席此是飲食或講説之客故有請入為席之儀節也下章主人跪正席正為先時實未甞入為席故又有此儀節也拾級聚足鄭注拾當作渉聲之誤也涉等聚足謂前足躡一等後足從之併吕氏讀拾其刼反云拾更也拾級左右足更上也按拾級當從舊説吕氏謂左右足更上如此則不得聚足矣左右足更上者謂之厯階栗階有急事升降則為之喪禮略威儀謂之散等平時賓主升階當不栗階散等吕説誤矣凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者按為長者糞之禮詳見弟子職埽前有灑埽固無塵以袂拘而退者敬也非真以袂障塵也加帚于箕上自是初往時弟子職執箕膺擖厥中有帚可證若埽時箕倚於戶側俟埽訖然後以箕收之非執箕以埽也此節當從舊説奉席如橋衡鄭注横奉之令左昻右低如有首尾然橋井上㮮橰朱文端公云按陳注如橋之髙如衡之平較舊注直截按陳注如橋之髙如衡之平雖若直截實俗訓詁也橋髙出水上奉席豈能如之當從舊注㮮橰之説㮮橰見莊子席南鄉北鄉以西方為上東鄉西鄉以南方為上鄭注上謂席端也布席無常坐在陽則尚左坐在隂則尚右疏曰此謂平常有席如此禮席不然朱子曰東鄉南鄉之席皆尚右西鄉北鄉之席皆尚左按古人常坐在室中此文大約就室中之席言之南北鄉以西方為上者統於奥也東西鄉以南方為上者統於户牖與堂也若堂上南鄉之席皆以東為上飲燕食射皆然惟神席尚右以西為上故昬禮醴賓徹几改筵明不以西為上也鄉飲鄉射賓若有遵者席於賓東此則以西為上盖統於戶牖間之酒尊明不與賓同東上取義又異也就屨跪而舉之屏於側鄉長者而屨跪而遷屨俯而納屨朱子云注云長者送之恐非是但謂雖降階出户猶嚮長者不敢背耳按就屨跪而舉之屏於側是解屨後未上堂時事鄉長者而屨是既退下階時事不可以此句連上句也跪而遷屨是將納屨時稍移近前非申言舉而屏也此節只當從孔疏與朱子説更無别解嫂叔不通問鄭注通問謂相稱謝也方氏云若問安問疾之類陳氏云無問遺之往來也朱文端公云謂不相親問答也按諸説皆可通文端公説為優有當問者使人傳之可也女子許嫁纓按此纓俟昬禮之夕壻親脱之凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醬處内蔥㳿處末酒漿處右以脯脩置者左朐右末按以鄭注繹之食羹最近人膾炙醯醬在殽胾之外内蔥㳿處醯醬之左酒漿處羮之右則諸物當列為四行第一行左食右羮而酒漿在羮之右第二行為醯醬而蔥㳿在醯醬之左第三行左殽右胾第四行為膾炙又醯醬一本作醢醬孔疏有二説若是二物則醬在右醯在左如昬禮公食大夫禮之設今本作醯醬則是以醯和醬共為一物疏又謂鄭注蔥㳿云處醯醬之左則醯醬一物為勝脯脩之設注無明文孔疏謂處酒左以燥為陽也按酒左是羮何得於此置脯脩此則孔疏之誤當是設於酒漿之右耳祭食祭所先進殽之序徧祭之按公食禮先設正饌訖賓祭正饌後設加饌賓又祭加饌其祭如所設之序而設饌唯有二次此記尋常賓客飲食之禮主人與之共食雖未知設饌㡬次要必設訖而後祭非進一殽祭一殽也共飯不澤手吴氏云飯扶晚切下摶飯放飯揚飯飯黍並同又云此節五飯字皆當作上聲讀飯謂食之也按陸氏釋文云依字書食旁作卞扶萬反食旁作反符晚反二字不同今則混而一之愚謂此節五飯字唯放飯飯黍二飯字音上聲若共飯摶飯揚飯三飯字當音扶萬切指所食之飯而吴氏皆讀上聲誤矣毋咤食鄭注嫌薄之孔疏云咤謂以舌口中作聲似嫌主人之食也陳氏云謂當食而叱咤毋咤恐似於氣之怒也按陳説非是當從注疏毋固獲吴氏云固獲二字一意謂固必而取得之也按當從吴氏説飯黍毋以箸孔疏云飯黍毋用箸當用匕故少牢云廩人溉匕與敦注云匕所以匕黍稷是也按此句鄭氏無明釋上文共飯不澤手注云禮飯以手孔疏云古之禮飯不用箸但用手然則飯黍毋以箸亦謂不以箸而以手也下文羮之有菜者用梜鄭注云梜猶箸也然則古人以箸食羮耳此疏引少牢謂當用匕與前禮飯以手相牴牾少牢之匕黍稷謂從㸑匕出入敦非謂以匕食黍稷也弟子職云左執虚豆右執梜朼周旋而貳亦是以朼益飯如今人之飯匙非以朼食飯也許慎説文釋箸為飯攲盖後世始以箸食飯耳又按鄭氏通毋揚飯飯黍毋以箸毋嚃羮三句總注云亦嫌欲疾也以此推之古人之箸即弟子職之梜朼如今人之飯匙所以盛飯入食器飯黍以箸者是欲食之急於梜朼中食飯也至漢初張良借箸陳事以箸代算始若今人之箸若紂之象箸當是以象飾梜朼耳毋嚃羮鄭注亦嫌欲疾也嚃為不嚼菜按羮無菜者不用梜則亦有以口取食者矣當從鄭注侍飲於長者酒進則起拜受於尊所鄭注降席拜受敬也燕飲之禮鄉尊按孔疏以尊所為陳尊之處廣引燕射鄉飲設尊處所謂此言拜受於尊所者當是燕禮而燕禮不云拜受於尊所鄉飲亦無此語疑是文不具又引何允云尊者主人也拜者在尊所對主人也降席下奠爵再拜稽首嚮尊謂主人尊也則尊字為尊卑之尊二説當以前説為是吕氏謂禮飲與侍飲異亦是也餕餘不祭父不祭子夫不祭妻朱子云按禮君賜腥則孰而薦之以為榮若賜孰食則恐是餕餘故不以祭妻子雖卑於巳然既沒則以神道接之故亦不以祭也按此經固當斷從朱子説而陳氏集説兼存祭食之説與註疏小異亦可玩也御同於長者雖貳不辭鄭注謂侍食於長者饌宜與之同也貳謂重殽膳也辭之為長者嫌按貳鄭氏以為重殽膳固當從之愚疑尚有二説一謂貳益之也如易貳用缶酒正大祭三貳弟子職周旋而貳之貳謂食物盡而主人復益之有長者在則已不辭其益一謂貳副也如左傳貳圉之貳長者之副也有長者在唯長者一人辭巳雖次尊亦不辭貳猶不辭其下可知下文偶坐不辭謂二人同尊卑者也姑記所疑俟知者擇之言不惰鄭注憂不在私好惰不正之言按謂不為戯慢之言有憂者側席而坐有喪者専席而坐鄭注側猶特也憂不在接人不布他靣席専席而坐降居處也専猶單也吕氏云側席坐不安也専席不與人共坐也胡氏云側不正也按燕居之時無他賓客亦當不布他靣席如有憂而賓客來慰問亦豈得不為賓設席平時坐席皆是單席有所尊敬乃重席不必有喪而後單席也鄭注誠未當然吕氏以側席為坐不安與側義亦不協而胡氏以側為不正豈可坐偏邪之席乎愚謂坐席皆随席所鄉側席而坐者如席南鄉北鄉則坐者東鄉西鄉席東鄉西鄉則坐者南鄉北鄉以其有憂異於常也専席之説則吕氏得之獻田宅者操書致孔疏云古者田宅悉為官所賦本不屬民今得田宅獻者是或有重勲為君王所賜可為巳有故得有獻按古者君有賜於臣亦謂之獻檀弓云仕而未有祿者君有饋焉曰獻是也假令齊封孔子尼谿田楚封孔子書社地齊王授孟子以室必有使者操書致之豈不可謂之獻乎尊卑垂帨鄭注帨佩巾也磬折則佩垂授受之儀尊卑一孔疏云謂賓主俱是大夫則為尊俱是士則為卑朱子云此謂賓主雖或一尊二卑然皆當磬折垂帨也按鄭云授受之儀尊卑一謂賓主不論尊卑皆以垂帨為度假令賓尊而主卑賓亦垂帨以敬主或主尊而賓卑主亦垂帨以敬賓孔疏以賓主尊卑相敵言之盖因下文鄉與客竝然後受註云禮敵者竝授故為此解其實不相敵亦皆垂帨也唯臣與君授受或有時異晏子聘魯公受玉卑晏子授玉跪此又禮從宜也鄉與客竝然後受鄭注於堂上則俱南靣禮敵者竝授按賓主不敵則對授在堂上則尊者南靣卑者北靣若賓主甚殊則卑者奠之而不敢授覲禮侯氏奠圭昬禮壻奠雁婦奠摯及童子委摯是也主人既拜受則賓授弓之後亦當有拜送而主人還辟辟拜之儀不言者文不具也禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸孔疏云子孫行並皆㓜弱則必抱孫為尸不得抱子為尸曽子問云尸必以孫孫㓜則使人抱之無孫則取於同姓可也方氏云凡為尸者不必皆㓜必曰抱以見禮所在不以㓜而廢也王氏炎云特牲禮注大夫士以孫之倫為尸言倫明非已孫崔靈恩謂大夫用已孫為尸非也按抱孫不抱子孔疏及方氏説可從若謂生時唯祖抱孫而父不抱子似非人情子生三年然後免於父母之懐有不抱子者乎王氏本孔疏辨崔靈恩大夫用巳孫為尸之非亦不然假令適子主祭其兄弟之子於所祭者為孫則適子亦可事之矣曽子問明言尸必以孫無孫然後取於同姓未甞謂巳孫不可為尸也此經明言孫可以為王父尸未甞謂必他人之孫也孫為巳血屬祖之憑依當彌親切耳尸必式乘必以几鄭注尸必式禮之乘必以几尊者慎也孔疏云几案在式之上尊者有所敬事以手據之几上有幂君以羔皮以虎縁之也按乘必以几謂尸登車履几而上故鄭注云尊者慎也士昬禮婦乘車以几御者二人坐持之是其明證夏官隸僕王行洗乘石詩云有扁斯石履之卑兮尸登車宜亦用乘石而此言以几者盖諸侯之尸也孔疏謂几在式上按輿人參分軫圍去一以為式圍注云兵車式圍七寸三分寸之一以方計之廣不及二寸式上安可置几況車行摇動能馮之以為安乎羔幂覆於式未聞覆於几也孔疏而下説者皆誤賜人者不曰來取與人者不問其所欲臨川王氏云為人養亷也陳氏云賜者君子與者小人朱氏云君子有守必將之以禮小人無厭必節之以禮按尊者曰賜敵者曰與王氏為人養亷之説甚善陳氏朱氏之説則因玉藻凡賜君子與小人不同日而誤彼所謂與者連及之辭非謂君子曰賜小人曰與也國君撫式大夫下之孔疏云謂君臣俱行君式宗廟則臣宜下車按下文國君下齊牛式宗廟熊氏謂此文誤當作下宗廟式齊牛此疏猶云式宗廟非也然君撫式亦不止齊牛急繕其怒按呂氏讀繕如字陳氏集説從之舊讀為勁音義太逺交遊之讎不同國鄭注讎不吾辟則殺之按大戴禮曽子制言上篇云父母之讎不與同生兄弟之讎不與聚國朋友之讎不與聚鄉族人之讎不與聚鄰盧辨註不與聚鄉云曲禮曰朋友之讎不同國失厚矣彼註優於此註二戴所記亦以彼為優又周官調人云從父兄弟之讎不同國主友之讎視從父兄弟與此文似合然曰主友與主並言之亦謂友之有恩者非若泛常之交逰也卜筮不相襲鄭注卜不吉則又筮筮不吉則又卜是瀆龜筴也晉獻公卜取驪姬不吉公曰筮之是也按不相襲有三説一謂卜不吉不可復筮筮不吉不可復卜鄭注是也然占人云國之大事先筮而後卜而洪範亦有龜從筮逆之文則卜筮亦可相襲矣一謂大事小事各有所施不得因龜卜小事因蓍筮大事鄭氏註表記云襲因也大事則卜小事則筮用此説然大卜云凡小事涖卜而國之大事又必先筮者何也一謂三筮及三卜不相襲三者初各専其心王肅之説也吴氏以為一卜之後須俟他日然後再卜三卜不可於一卜再卜之日而相因重複以卜筮亦然此用王説之意非但可施於卜筮日而巳此文承卜筮不過三之下當以此説為優大抵卜筮之禮經傳雜出各有乖違表記篇劉氏言之詳矣吕氏用第一説謂常事不相襲大事則卜筮並用亦可通婦人不立乘孔疏立倚也男子倚乘婦人質弱不倚乘而坐乘馬氏云婦人乘安車故不立乘按疏説未盡不立乘亦所以自屏逺恥安車輲輪老人所乘馬氏説誤君命召雖賤人大夫士必自御之鄭注御當為迓君雖使賤人來召已必自出迎之尊君命也方氏云自御為之僕張子云御謂御車奉君命而召雖所召者賤使者當親御之按詩百兩御之春秋傳跛者御跛者御之音迓者多矣當從鄭氏註方氏張子各為一説皆未安如君使賤人來召其人未必皆乘車若謂使者親御所召之人則所召者必俟駕而後行乎君使賤人召大夫固有之使大夫召賤人恐無是事如有之必是賢者不可謂賤人國中以策彗䘏勿驅塵不出軌勿舊音沒鄭注入國不馳彗竹帚䘏勿搔摩也朱子云策彗疑謂策之彗若今鞭末韋帶耳按當從鄭氏朱子説䘏勿雙聲假借字也曲禮下執玉其有藉者則裼無藉者則襲鄭注藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也孔疏云裼所以異於襲者凡衣近體有袍襗之屬其外有裘夏月則衣葛其上有裼衣裼衣上有襲衣襲衣之上有常著之服則皮弁之屬也掩而不開則謂之襲若開此皮弁及中衣左袒出其裼衣謂之為裼故鄭注聘禮云裼者左袒也按聘禮聘君以圭聘夫人以璋皆特逹無束帛以藉其時使者襲而君受玉亦襲享君以璧享夫人以琮皆有束帛藉之其時使者裼而君受玉亦裼此經所謂有藉無藉者本謂此而注疏併以垂繅屈繅言之且以此説為主朱子斷歸一説陳氏所引者是也又按鄭氏註玉藻云袒而有衣曰裼註聘禮云凡袒裼者左此二語最明盖袒而有衣曰裼對袒而無衣為肉袒也凡喪禮之袒射禮之袒祭禮迎牲割牲及養老禮割牲之袒皆肉袒也非肉袒則皆曰裼凡袒裼者左謂開出前衿袒出上服之左袖露其裼衣唯覲禮侯氏右肉袒請事註云刑宜施於右也後人不識古人袒袖之禮裼襲之義不明陳氏此註本孔疏獨删其左袒出裼衣謂之裼數句則所謂開而見出其裼衣者從何處開出乎又按裼衣外之衣疏家有兩説孔氏此疏謂裼衣外有襲衣襲衣外有常著之服至檀弓襲裘裼裘及喪大記襲裘加武疏則謂裼衣外即為上服前後自違異賈公彦聘禮疏亦謂裼衣外有上服當以此疏為正盖不袒即謂之襲非别有襲衣其中衣則在裘之内也侍於君子不顧望而對非禮也鄭注禮尚謙也不顧望若子路率爾而對應氏曰顧望者從容詳審有察言觀色意言不輕發非但謙孫而已按當兼應氏説乃備夫子亦曰未見顔色而言謂之瞽君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之按舊説謂不變其本國之故俗詳經文本指似不如此盖謂禮當從宜君子居人國不求變異於俗凡祭祀之禮居喪之服哭泣之位皆如今所居之故俗斟酌其宜謹修其法而審慎以行之雖不違俗亦不苟徇俗也去國三世爵禄有列於朝出入有詔於國若兄弟宗族猶存則反告於宗後去國三世爵禄無列於朝出入無詔於國唯興之日從新國之法陳氏云去本國雖已三世而舊君猶仕其族人於朝以承祖祀此人往來出入他國仍詔告於本國之君其宗族兄弟猶存則必有宗子凡冠娶妻必告死必赴不忘親也若去國三世朝無仕宦之列出入與舊君不相聞其時巳久其義巳絶可以改其國之故矣然猶必待興起而為卿大夫乃從新國之法厚之至也按有列則有詔猶存則反告無列則無詔事相因也陳氏謂出入有詔於國為此人往來出入他國仍詔告於本國之君最是舊説謂與卿大夫吉凶往來相赴告又謂兄弟宗族猶存者為無列無詔皆非是又按此經互文見義兄弟宗族猶存而反告於宗後於有列有詔者言之則無列無詔而兄弟宗族猶存者亦當反告可知矣唯興之日從新國之法於無列無詔者言之則有列有詔而未興者不忍從新國之法可知矣古人行文多如此臨川吴氏割上章謹修其法而審行之句竄入出入有詔於國之下移若兄弟宗族猶存二句竄入出入無詔於國之下則上章皆如其國之故句下辭義有不足矣鞮屨鄭注無絇之屝也吕氏云革屨也周官有鞮屨氏革去毛而未為韋非吉屨也按吕氏説是大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱孔疏云辱謂見他國君也故聘禮云公在門左拜是拜其辱也按後言同國始相見則前言大夫見國君士見大夫皆謂異國孔説是又同國始相見主人拜其辱亦謂士始見大夫故士相見禮云士見大夫於其入也主人一拜賓退送又再拜是也若尊卑相等則主人宜拜辱不必言矣五官致貢曰享陳氏祥道云王制公侯伯子男凡五等卿大夫上士中士下士凡五等曲禮六大以皆謂之五官然五官致貢與五官之長所謂五官者諸侯而巳盖以其有所候則曰侯以其有所主則曰官以物供上曰貢以儀致貢曰享周禮凡官府所供謂之獻邦國所供謂之貢則致貢曰享為諸侯之事明矣吴氏云注疏諸侯因上六大五官之文釋此五官二字致誤唯陳氏之説得之盖五官猶五侯也公侯伯子男五等之侯朝覲天子以貢其土物皆先執圭以朝乃以玉帛將其所貢之物謂之享按當從陳氏吴氏説大夫曰孺人朱文端公云謂屬於夫不專制也按當從文端公説天子有后有夫人有世婦有嬪有妻有妾吕氏云后以配天子夫人視三公其名與諸侯之妃同世婦視大夫其名與大夫之妻同九嬪視九卿位在世婦上妻即御妻視元士名與士之妻同妾則昬義所無盖賤者視庶人吴氏云此以世婦先於嬪者夫人世婦皆以兩字為稱嬪妻妾皆以一字為稱取其文之便按吕氏吴氏説皆善大夫妻得稱世婦見喪大記自稱於諸侯曰寡小君孔疏云古者諸侯相饗夫人亦出故得自稱按寡小君者臣下擯相之辭也臣稱其君於諸侯曰寡君故稱其夫人於諸侯曰寡小君聘禮曰君以社稷故在寡小君雜記夫人薨訃曰寡小君不禄是也論語言稱諸異邦曰寡小君為優疏謂古者諸侯相饗夫人亦出故得自稱愚謂即有相饗之禮亦是擯者贊辭夫人無自稱之理也天子不言出諸侯不生名君子不親惡吕氏云賢者貴者皆謂之君子故天子不言出諸侯不生名皆謂君子不親惡故也按舊説以君子為孔子吕氏以君子為天子諸侯疑吕氏得之盖謂在上位者為君子者不可親為大惡也親為大惡雖天子猶言出諸侯且生名矣曲禮皆記禮事非論孔子作春秋故吕説為長聞之始服衣若干尺矣顔氏云干猶箇也按若干之説顔氏為優干箇一聲之轉若干猶云㡬箇也問大夫之子長曰能御矣㓜曰未能御也陳氏云御謂御車也御者六藝之一㓜則未能按當從御車之説長樂陳氏云社稷之事徳也御才也典謁事也負薪力也上下之别也其説甚善少儀所記則記者異聞耳問國君之富數地以對山澤之所出陸氏云山澤之所出所以釋上數地以對也先儒謂數地廣狹又以山澤所出而對非是按陸氏説是凡對必有文辭故以山澤所出之物為對若云我國方若干里則直而拙矣水曰清滌按春官司尊彛云凡酒修酌修讀為滌鄭注云凡酒謂三酒滌酌以水和而泲之今齊人命浩酒曰滌然則水曰清滌者謂其清而可以和酒也溉濯之説非是大饗不問卜吕氏云冬至祀天夏至祀地日月素定故不問卜按當從吕氏説大夫雁孔疏云取其侯時而行也按一説候雁不可常得大夫用雁及士昬禮用雁盖舒雁也大夫用雁取其行有威儀士昬用雁摯不用死亦許其攝盛也納女於天子曰備百姓按此求女而主人許之之辭非致女之辭女子重别姓天子妾媵多故曰備百姓吴語越王句踐求成之辭曰一介嫡女奉箕帚以賅姓於王宫韋昭註云賅備也姓庶姓也即引此文為證是也禮記訓義擇言卷一
