body:
  text: 禮記訓義擇言禮類三禮記之屬提要臣等謹按禮記訓義擇言八卷國朝江永撰永有周禮疑義舉要已著録是書自檀弓至雜記於註家異同之說擇其一是為之折𠂻與陳澔注頗有出入然持論多為精核如檀弓殷練而祔周卒哭而祔吕氏謂祔祭即以其主祔藏於祖廟既除喪而後遷于新廟永據左氏傳特祀于主烝嘗褅于廟謂祔後主反殯宫至喪畢乃遷新廟引大戴禮諸侯遷廟禮奉衣服由廟而遷于新廟此廟實為殯宫今考顧命諸侯出廟門俟孔傳曰殯之所處曰廟又儀禮士喪禮曰巫止于廟門外註曰凡宫中有鬼神曰廟賈疏曰廟門者士死於適室以鬼神所在則曰廟故名適寝曰廟然則大戴禮所云由廟者實由殯宫非由祖廟永說有據可以解程張諸儒之異同又如玉藻云襲裘不入公門疏云裘上有裼衣裼衣之上有襲衣襲衣之上有正服據曲禮疏襲衣即所謂中衣永謂裼衣上即謂正服不得更有中衣今考玉藻君衣狐白裘錦衣以裼之註曰錦衣復有上衣天子狐白之上衣皮弁服皮弁即為錦衣之上服而裼衣之上不復更有中衣可知雖孔疏所說據玉藻有長中繼揜尺之文然繼揜尺之中衣不襲裼衣後漢輿服志宗廟諸祀冠長冠服袀元綘縁領袖為中衣綘絝􅙋漢書萬石君傳註中帬若今中衣釋名中衣言在小衣之外小衣即䙝衣也然則中衣但得襲褻衣不得襲裼衣也孔疏顯誤亦以永說為確又雜記曰如三年之喪則既顈其練祥皆行註曰言今之喪既服顈乃為前三年者變除而練祥祭也此主謂先有父母之服今有喪長子者其先有長子之服今又喪父母其禮亦然永謂玩註既字乃字之意本謂未顈以前值練祥不得行止如纂言附論後喪變麻可補行之說非謂既顈而值前䘮一期再行也今考上節曰有父之䘮如未沒䘮而母死其除父之䘮也服其除服卒事反䘮服疏曰謂母死既塟後值父應大祥除服以行祥事然則母未塟而值父大祥亦不可行必待既塟然後補行明矣永於下節既字乃字之義疏解明確即上下二節之義亦俱可貫通其他若辨程大昌袒為免冠及皇氏髽衰為露紒髽之誤尤為精鑿不磨至䘮服小記生不及祖父母諸父昆弟而父稅䘮已則否王肅謂計已之生不及此親之存則不稅永特宗其說而於經文弟子字雖不敢如劉知蔡謨直以為衍文乃謂言弟者因昆連及之則其說臆度終不如鄭註為得然全書持義多允非深於古義者不能也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀禮記訓義擇言引禮記一書裁自小戴馬融附益之凡四十九篇雖精粗兼載純駁不一先王遺制聖賢格言往往頼之而存而讀者病其勦取殘編斷簡雜亂無次臨川吴氏别為删定大學中庸不廁禮篇投壺奔喪列為禮之正經冠昏飲射燕聘六義别輯為傳以附經此外存三十六篇曰通禮者九曰喪禮者十有一曰祭禮者四曰通論者十有二每篇中科分櫛别以類相從章之大㫖標識于左此自吴氏一家之書非可通行之於學校與鄉塾也類編之書便於考索不便於授讀論語孟子豈皆以類編記哉昔唐魏鄭公甞進類禮二十篇太宗雖嘉之錄置秘府而命儒臣纂修正義必仍禮記原文古之簡策不可輕移動也雖明知其脱文錯簡誤文衍文猶仍之今吴氏之書多以臆割裂竄易失其本義且本文亦多刋落方謂篇章文句秩然有倫先後始終頗為精密不但為戴氏忠臣後學讀之甚疑焉髙安朱文端公因其書多裒聚諸家之説也遂撰禮記纂言而附巳説於後以示折中焉永昔在休寧程太史恂處常以此書置案頭随筆籖識僅得十五篇程為詮次錄一本今學徒往往傳錄而全書未能卒業因年力巳衰非復曩時之精鋭故也吁經義難明禮家尤號聚訟制度名物厯代先儒解詁或中或否猶多遺義未經搜索者何可勝數荑稗瓦礫無非道也是以錄而存之乾隆庚辰夏五月江永識
