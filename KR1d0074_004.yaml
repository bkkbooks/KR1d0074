body:
  text: 禮記訓義擇言卷四婺源江永撰曽子問卿大夫士從攝主按攝主即下文大宰喪則攝拜賓喪祭朝則攝政大祝裨冕鄭注士服爵辨服大祝裨冕則大夫按爵辨雖士服大夫亦得兼之此告子生事重大祝裨冕釁廟禮輕則祝爵辨服祝聲三鄭注聲噫歆警神也按噫歆鄭以漢時警神之聲言之意古亦如此噫者發聲歆者聲之轉取聲不取義疏謂歆享文端公謂如尚饗皆非也此不設飲食何享之有尚饗乃祝詞之末欲神饗之非引聲也後世以咳聲用於吉祭者誠誤升奠幣於殯東几上鄭注几筵於殯東明繼體也按司几筵柏席用萑每敦一几鄭讀柏為椁謂殯之椁燾是人君之禮殯東常有几筵此注似言為明繼體特設几筵者蓋此注不與彼參照又或喪事仍几此告子生特改新之也疏引皇庾熊說斷之以熊為是皇庾為非皆不知引每敦一几以明殯東之有几則熊與孔亦未是既夕禮之下室即殯宫之室朝夕奠常設於此燕養饋羞亦於此孔氏乃謂素几是殯宫朝夕奠之几不在下室豈下室又在殯宫之外乎鄭解下室如今內室與喪大記之下室異子踊房中亦踊三者三襲衰杖鄭注踊襲衰杖成子禮也按襲衰杖每字為句襲者諸臣襲衰者為子著衰杖者少師代子執杖也前少師入門奉子以衰實未服至此始服之象成服以漸也袒襲諸臣之事注并襲為成子禮是連襲衰為句孔氏因謂踊時子亦袒誤矣初生之子使之肉袒不近人情皇氏不袒之說是徹饌而掃即位而哭疏云熊氏以即位而哭謂在冠家即位以文承徹饌而掃之下皇氏以為即喪家之位非也按熊氏說是然當云冠家之廟凡聞同宗之喪皆哭於廟有殯乃哭諸側室又按此言即位而哭謂齊衰大功之親在逺地者為位而哭也若在近處自當如皇氏說哭於其家壻巳葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而不敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也女之父母死壻亦如之按必待巳葬而致命者疏謂葬後哀情稍殺始兼他事是也其云不得嗣為兄弟者謂因喪故稽遲昏事若非喪則已嗣為兄弟矣此辭正不欲其嫁也非謂今後遂不得嗣為兄弟遽令其改嫁也女氏許諾者許其不改嫁也其辭若云敬聞命矣某之子敢不守禮以須故曰許諾而不敢嫁如壻家諷其改嫁而女氏不敢嫁則當云不許何云許諾乎既巳許諾則竟嫁之矣何又不敢嫁乎注云不敢以纍年之喪使人失嘉㑹之時是誤讀不得嗣為兄弟之辭而害意者也壻免喪女之父母使人請成昏踐其前之諾也壻家於是取之禮之常也萬一壻家有他故不欲取女氏不能强然後嫁之此又禮之權宜夫子亦舉其或有之事言之正謂女家不得輕嫁也非謂父母死者概弗取概改嫁也女之父母死既葬女家亦以不得嗣為兄弟之辭明其稽遲昏事之故諷壻家不得别取壻家許諾而弗敢取女免喪壻之父母使人請成昏女家嫁之常也萬一女家有他故不欲嫁此壻壻家不能强然後别取非是無有不取者也壻别取女家亦必還其幣如出妻者還其器皿之比此亦可知也朱文端公云免而請弗取而後嫁正見未免未請不敢嫁也玩禮也二字聖人之意正教人不得遽嫁謂非有故不得假愆期之說而别嫁别取也此說是矣然猶惑於舊注之說謂壻之辭為女計女之辭為壻計此古人之厚道不知本文不得嗣為兄弟原非辭昏之辭如謂此為厚道則女家既巳待其三年免喪矣失時者猶可及時矣乃猶固執前說不取令其再許嫁再行納采問名納吉納徴是失時者愈失時何其始厚而終薄乎後世有泥壻弗取而后嫁之禮也之語遭父母喪以絶昏為禮者固為大謬又有欲圓其說謂壻辭弗取而后嫁之仍是嫁此壻者亦非文意壻免喪而取有何嫌疑乃故為弗取之辭豈禮宜如是耶曽子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反於初按齊衰大功之喪女既改服即位而哭殯後自當有見舅姑之禮除喪後成昏但不行同牢之禮亦自有媵御交質衽席於奧入室脫纓之儀黃叔陽譏其不見舅姑同於苟合過矣三月而廟見稱來婦也擇日而祭於禰成婦之義也按三月廟見稱來婦正與昏禮三月奠菜稱某氏來婦合宜為一事若擇日而祭於禰則士昏記婦入三月然後祭行是也適婦主亞獻猶舅姑存時盥饋即是成婦之義非别有牲物致祭其為庶婦若孫婦亦於廟中禮相助奠亦是成婦之義也孔疏不引三月祭行以合於擇日祭禰乃合廟見奠菜祭彌為一事此則孔氏之誤而文端公則分廟見奠菜為二事謂祭行即廟見謂舅姑存者亦有廟見愚謂舅姑存者但有三月入廟助祭之禮别無廟見祖舅祖姑之禮孫婦見祖廟自是後世俗禮不可以例古人也鄭公子忽如陳逆婦先配而後祖祖者告祖廟也謂其先配而後告廟非謂婦廟見也春秋時有娶妻先告廟之禮伯州犂所謂圍布几筵告於莊共之廟而來是也賈逵服䖍誤解左傳謂大夫以上無問舅姑在否皆三月見祖廟之後乃始成昏迂謬可笑莊姜翟茀以朝詩人歌之曰大夫夙退無使君勞欲其與夫人見也豈有三月成昏之禮耶疏謂必待三月一時天氣改乃可以事神亦不然三月固是一時古人之意蓋欲遲之一時觀其婦之性行和於夫宜於室人克成婦道然後可廟見而祭禰大夫則有反馬之禮前此猶留其送馬不敢自安有出道者則出之未廟見而死者則有殺禮歸葬如下章之云豈止俟天時改哉日食按古厯疏無豫推日食之法故有猝遇日食不得終禮之事後言喪引至於堩日有食之安知其不見星亦是不能豫知其食分也天子嘗禘郊社五祀之祭按鄭注周禮以句芒等五人神為五祀此注五祀以為關中言之皆非也天子而下皆以户竈中霤門行為五祀祭法所言者記人之異說接祭而巳矣鄭注接祭而巳不迎尸也按疏謂迎尸有二一是祭初迎尸於奧行灌禮畢而後出迎牲於時迎尸於户外行朝踐之禮一是合亨而迎尸入坐於奧行饋孰之禮此云不迎尸者直於堂上行朝踐禮畢則止不更迎尸而入此謂宗廟之祭郊社之祭無文不迎尸亦謂此時是也陳氏節略疏文不細考其說乃云滅略節文務在速畢無迎尸於奧及迎尸入坐等禮是并祭初之迎尸亦無之更有何節文乎既殯而祭既葬而祭按熊氏謂於是冡宰攝主其說是曽子曰父母之喪弗除可乎鄭注以其有終身之憂按此曽子更端之問與上章不連注得其指故君子過時不祭禮也按此以祭明喪祭過時不祭為禮則喪過時不除為非禮賤不誄貴幼不誄長禮也鄭注誄纍也纍列生時行迹誄之以作諡諡當由尊者成吳氏曰誄謂哀死者之辭猶後世祭文哀辭之類鄭解誄為諡非也如哀公誄孔子何嘗為孔子作諡按吳氏說是攝主不厭祭鄭注厭厭飫神也厭有隂有陽迎主之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設於西北隅是陽厭也此不厭者不陽厭也陸氏曰據下文殤不祔祭何謂隂厭陽厭是成人之祭無隂厭陽厭鄭氏說非是按少牢祝酌奠下云用薦嵗事所以告之爾非隂厭也徹俎設敦几筵納一尊闔牖户所以依神周禮所謂藏其隋者此與非陽厭也庶殤從祖祔食乃有隂厭陽厭即特祭不厭祭吳氏曰厭者殤祭之之名此名不施於正祭鄭注以祭初饗神於奧為隂厭祭未依神於屋漏為陽厭後儒承其誤陸氏破其說之非是者得之不厭祭蓋謂宗子去國庶子攝祭則但祭正統之親不及旁親之殤與無後者爾按大戴禮云無祿者稷饋稷饋者無尸無尸者厭也是凡祭無尸者皆謂之厭後曽子問祭必有尸乎若厭祭亦可乎正謂祭初祭末之厭皆無尸此言攝主不厭祭逆陳殺禮之事正謂祭末之陽厭陸氏必欲破鄭注謂用薦嵗事但以告神而非隂厭不知饗神之時俎必陳酒必奠敦必啓祝辭必稱尚饗主人兩再拜稽首豈非欲其饗之乎郊特牲曰直祭祝於主祭統曰尸亦餕鬼神之餘則此時實為事神之正祭而尸食猶是餕其餘豈徒曰告神而巳乎若祭末後復改饌西北隅為陽厭此不知神之所在於彼於此之意陸氏謂是依神既祭畢矣神豈無依欲依神何為復陳尊俎敦乎又謂此周禮之藏其隋夫所謂隋者尸祭菹醢黍稷肺於豆間既祭藏之不欲其䙝也若陽厭者取尸所未舉之牲體俎釋三個并未食之黍稷設之豈可以藏隋當之乎吳氏不能詳考諸經辨正其謬反以其破鄭說為得因謂此不厭祭為不及旁親之殤與無後者是宗子一人有罪而殤與無後者皆因之餒也豈制禮之意乎且上下文皆論正祭之事何暇及旁親之殤與無後者若宗子死告於墓而后祭於家鄭注祭於家容無廟也按家者對墓言之祭於家即是祭於廟非謂容無廟也蓋宗子若無罪去他國宜以廟從宗子死自有子祭之庶子不得祭惟其有罪居他國廟猶在本國宗子雖有子不能歸而祭故庶子代祭之若其無廟則是庶人庶人以時薦於寢無牲無尸不成其為祭夫子亦不必言之矣宗子死稱名不言孝身沒而巳鄭注宗子可以稱孝疏云庶子身死其子則是庶子適子祭庶子之時可以稱孝按此論正統之祭未論祭庶子庶子無爵則是庶人庶人薦而不祭亦不必言之或是孫祭祖得稱孝孫與抑或謂庶子攝祭止於其身庶子之子賤為庶人則當鬼其祖不復更祭與子游之徒有庶子祭者以此若義也按夫子當稱子游姓名此記人改稱字耳吳氏謂此下記者所自言未必然若厭祭亦可乎鄭注厭時無尸按凡無尸者皆為厭祭初祭末是厭士虞禮有無人可為尸而祭之者亦是厭也曽子之問原不謂若殤祭之厭且祭殤之隂厭陽厭下文孔子答之曽子始明此處自是指無尸之厭陸氏吳氏皆謂厭為殤祭之名則此句豈可通乎陸氏亦知其難通别為之說曰厭猶禮之有飫也朝獻猶禮之有饗也饋獻猶禮之有食也燕私猶禮之有燕也牽强比類皆無義理曽子問曰殤不祔祭何謂隂厭陽厭鄭注祔當為備聲之誤也按祔當讀如字曽子之意謂祭祖禰有隂厭陽厭祭殤當特祭不祔於祖禰之旁共享其祭始修一厭祭而已何為有隂厭陽厭乎文王世子抗世子法於伯禽按當成王時周公為太傅召公為太保太公為太師必有朝夕納誨之言其左右前後必多疑丞輔弼之人非専恃伯禽以善成王也而使伯禽時與之居處舉世子法以教伯禽即所以教成王成王有過亦即伯禽之過故撻伯禽以感悟之蓋救過用威之道不能行之於君臣者可行之父子此周公格君委曲之苦心故夫子謂之于其身以善其君此事本無可疑即舊注謂舉以世子之法使與成王居而學之亦似無病也凡學世子及學士必時鄭注學士謂司徒論俊選所升於學者陸氏釋文學户孝反教也下小樂正學干籥師學戈學舞干戚同按鄭注及釋文學士之學本讀如字吳氏陳氏謂學皆音效非也胥鼓南鄭注南南夷之樂也旄人教夷樂則以鼓節之詩云以雅以南謂詩之二雅二南也此云胥鼓南亦謂大胥以鼓而節二南之樂歌耳按吳氏說近是若夷樂雖祭祀所不廢非世子學士所急也愚謂南即文王之象舞季札所觀象簫南籥是也故詩曰以籥凡祭與養老乞言合語之禮皆小樂正詔之於東序鄭注合語謂鄉射鄉飲酒大射燕射之屬也鄉射記曰古者於旅也語疏云合語者謂合㑹義理而語說也祭末及養老亦皆合語故詩楚茨論祭祀之事云笑語卒獲是祭有合語也養老既乞言自然合語此先言祭與養老乞言别云合語則合語非祭與養老故知是鄉射等旅酬時合語也按此皆言學中之事祭謂釋奠釋菜也乞言合語皆養老時之禮也其禮行於登歌清廟之後下管象舞大武之前下經云既歌而語以成之也言父子君臣長幼之道合德音之致禮之大者也分言之君求言於老人為乞言三老五更羣老與君言父子君臣長幼之道為合語合言之乞言合語皆謂之語內則謂三王皆有惇史惇史所以記此言語也乞言合語皆有威儀小樂正詔之其言語有篇章辭說大樂正授數大司成論說之經文前後甚明注疏乃以飲射旅酬之語釋之誤矣鄉射記古者於旅也語蓋謂行禮以靜默為敬唯旅酬時以酒相勸乃可言語記者見時人行禮有不當語而語者故云古者於旅也語非謂此時有合語之禮也養老之合語歌後特行之非若旅酬時之笑語也大樂正學舞干戚語說命乞言皆大樂正授數大司成論說在東序鄭注此云樂正司業父師司成即大司成司徒之屬師氏也師氏掌以媺詔王教國子以三德三行及國中失之事也新安王氏曰論說者即舞干戚語說乞言之數為講論而詳說之也大司成即大司樂也以世子及國子之德業大司樂教之使成也鄭注誤按論說王氏之說是舊注謂課其義之深淺才能優劣疏謂小樂正既詔以三者威儀大樂正又教以三者義理於是大司成論量課說之非也大樂正小樂正所教者儀文器數别設大司成一官専講說其義理故下文有侍坐於大司成函丈問答之事此經官名官制不必盡與周禮合鄭以師氏當大司成者固未必然王氏謂大司成即大司樂亦非也授數論說是二事豈大司業忽又稱為大司成哉司成自是古有其官近世猶有掘地得古器其銘詞稱司成者見朱彛尊集凡釋奠者必有合也有國故則否鄭注國無先聖先師則所釋奠者當與鄰國合也若唐虞有䕫龍伯夷周有周公魯有孔子則各自奠之不合也劉氏曰合謂合樂也春釋菜合舞秋頒學合聲釋奠則并合之以侑神也有國故謂凶札師旅唯是不合朱子曰以下文考之有合當為合樂國故當為喪紀凶札之類按當從劉氏朱子說凡大合樂必遂養老按鄭注謂養老用其明日三山陳氏譏其誤據後文視學養老同日愚謂因大合樂而養老者宜用其明日合樂養老不能一日行也其特視學養老者同日養老之時歌清廟管象舞大武而不合樂也凡語於郊者鄭注語謂論說於郊學疏云謂論課學士才能也按注疏說是吳氏謂合語恐不然曲藝皆誓之以待又語三而一有焉乃進其等以其序鄭注曲藝小技能也誓謹也皆使謹習其事又語為後復論說也三說之中有一善則取之以有曲藝不必盡善進於衆學者又以其藝為次吳氏曰誓蓋戒勵之使勉於學三即上文德與事言也考察三者之中或有其一即進其品等於曲藝之上又以髙下為序按誓字之義吳氏得之三而一有焉舊說為長吳氏說亦兼存之無介語可也疏云無介無語於此禮可也朱子曰語即上文合語之語言可也眀釋菜時未可語禮尚嚴也按釋菜時未可語賔東序宜合語當讀無介為句而語可也自為句況于其身以善其君乎東滙陳氏曰以世子之法教世子直道也今舉世子法於伯禽而教成王是迂曲其事也按陳說得之舊讀于為迂是也解為廣大則非成王幼不能涖阼以為世子則無為也疏云成王既無父今若以成王為世子時則無為世子之處朱文端公曰周公以成王幼而為君前此未嘗習為世子法也按文義舊說似順文端公說亦得為一義其朝於公內朝則東靣北上臣有貴者以齒按此謂與宗人圖嘉㑹之朝若燕同姓於寢始入在庭之位如此若每日常朝於路寢同異姓之臣皆在則如燕禮大射禮之位卿西靣北上大夫北靣東上士西方東靣北上皆以官不以齒也其在外朝則以官司士為之鄭注外朝路寢門之外庭按天子治朝之位詳司士諸侯治朝之位無文疏引大射言之或亦當如燕與大射內朝之位也其在宗廟之中則如外朝之位宗人授事以爵以官按宗廟如外朝之位謂亦如外朝之以官不以齒非謂祭與朝同位也同姓無爵者皆以昭穆序於阼階之東南西靣北上昭為一行穆為一行同姓之有爵與異姓之有爵者皆以爵序於西階之西南東靣北上士初立於門西北靣得獻則移而東靣北上其公大事則以其喪服之精粗為序鄭注其為君雖皆斬衰序之必以本親也按斬衰本無精粗此言以其喪服之精粗者據常法本親之五服也陳氏謂衰制雖同而升數之多寡則各依本親非是諸父守貴宫貴室諸子諸孫守下宫下室吳氏曰春秋傳諸侯始祖稱太廟羣公稱宫此貴宫謂羣公之廟下宫謂羣公之下者如魯仲子之宫之類宫統言室則宫中之室也後申釋前文但言貴室下室可見宫與室之非二矣鄭注以貴宫貴室為路寢下宫為親廟下室為燕寢親廟貶稱下宫子孫守之路寢反稱貴宫諸父守之是尊巳所居而卑祖禰義殊未安蓋君出庶子但以族人守宫廟而巳若君之所居無容族人守也公宫是總言太廟貴宫下宫五廟共為都宫故總謂之公宫也按吳氏說是公族以宗廟為重故分守之若路寢燕寢自有守者遂發咏焉鄭注發咏謂以樂納之按以樂納之蓋奏肆夏也以鐘鼓奏之而無辭疏謂發其歌咏非也既歌而語按說見前注謂歌備而旅旅而說非也下管象舞大武大合衆以事鄭注象周武王伐紂之樂也以管播其聲又為之舞皆於堂下衆所合學士也東滙陳氏曰象是文王之舞周頌維清乃象舞之樂歌武則大武之樂歌也象舞次非武舞按季札見舞象簫南籥者曰美哉猶有憾象為文王樂明矣管者匏竹之總名以管奏象舞舞人亦吹籥秉翟而舞仲尼燕居云下管象武夏籥序興是也詩序言維清奏象舞者未必然而象必非武王之樂大合衆以事事即奏象舞武之事陳氏謂行養老之事非是反養老幼於東序長樂陳氏曰兼幼言之者耆老孤子先王未嘗不兼養然非所重特老者而巳按陳氏說是此言終之以仁故兼饗孤子言之王氏删幼字非也禮運蕢桴而土鼓廬陵胡氏曰蕢草也以草為桴鄭以蕢為􅤓非也若云聲誤不應明堂位又誤按胡氏說是疑蕢與通莖似菅可為桴土鼓燒土為鼓即缶也故𤣥酒在室醴盞在户粢醍在堂澄酒在下按𤣥酒在室即明水配鬱鬯也以其重古故首言之其在戶在堂在下者亦以明水配齊以𤣥酒配酒非謂室中一設其餘不設也又崔氏謂大祫備五齊三酒禘祭用四齊時祭用醴盎二齊未必然愚疑泛齊最濁用之天地神祗不用之宗廟故諸篇皆無言泛齊者宗廟用鬱鬯無泛齊神祗用泛齊無鬱鬯亦相變也疏引崔氏言大祫九獻之儀節未必盡然如尸坐於堂其時主當在室故郊特牲云詔祝於室坐尸於堂崔謂主亦在尸之右則周禮唯有司巫共匰主未有言迎主出入者也禮器云設饌於堂為祊乎外謂薦腥薦爓之饌若既合亨饋孰當陳饌於室行隂厭崔謂先陳之於堂後乃徙堂上之饌於室豈其然乎腥其俎以法上古孰其殽以法中古則堂上薦腥有兩獻薦爓亦當有兩獻薦腥為朝踐薦爓為朝獻若隂厭之後延尸入室則當食舉未食不當有獻崔所序者無薦爓之兩獻而序五獻六獻於尸食之前又豈其然乎崔又謂大合樂以前謂之接祭曽子問所謂接祭者接猶捷也因有故而疾速以祭非有接祭之名也后再獻之後當賓長獻崔謂於是王可以瑶爵獻卿豈有賓未獻尸而王先獻卿者乎且獻卿玉爵非瑶爵也播五行於四時和而後月生也是以三五而盈三五而闕按五行分布於四時之中土無専位位在夏季中央而亦寄王於四季之月四時之順序由日行之進退而月輔乎日或合或離亦由是以生明生魄焉其大常之數十五日而盈十五日而闕朔虛所不論也三五猶云半月也五聲六律十二管還相為宫也按五聲六律十二管還相為宫猶下文云五味六和十二食還相為質五色六章十二衣還相為質言其迭有所主云耳非真一月而易一食一月而易一衣也五色六章十二衣還相為質也按六章者天地四方之色左傳謂之六采五色加𤣥為六章猶之五味加滑為六和此與五聲六律又别是一理鄭氏欲避五色之復取考工記土以黃其象方以下為六章吳氏又以衣裳各六為六章皆非是故先王秉蓍龜列祭祀瘞繒宣祝嘏辭說鄭注埋牲曰瘞幣帛曰繒按瘞繒謂埋制幣也若以瘞為埋牲則繒字單舉不辭禮器天子之席五重按司几筵皆三重之席無五重此記人之說異陳氏禮書謂席在筵上皆再重未確鬼神之祭單席疏云神道異人不假多重按司几筵祭祀席不單者為尸設席也此為神設席諸侯視朝大夫特士旅之疏云士不問多少共一揖之按周禮士旁三揖非一揖也以三等士分言之謂上士一揖中士一揖下士一揖則可耳天子之堂九尺疏云天子堂九尺周法也周氏曰九尺非周制周之上公以九為節則天子當以十二為節也按考工記周人明堂度九尺之筵堂崇一筵是九尺有明文上公雖亦以九為節堂上之制度如山節藻棁復廟重檐刮楹逹鄉之類當有不得而同者不嫌其同九尺也周氏說非是天子諸侯之尊廢禁大夫士棜禁陳氏曰棜雖差異於禁而鄉飲酒亦謂之斯禁蓋天子諸侯之尊有罍有舟謂雷動以時則有鼓物之利否則有害物之災舟善操之則有載濟之利否則有覆溺之患所以為戒也大夫士之尊命之禁所以禁之也德尊者有戒而無禁德卑者戒而又禁之所以無彛酒之過按司尊彛六尊不言承尊之物似與廢禁之說合然燕與大射諸侯之尊皆有豐注謂豐形似豆卑而大則又與此不合此亦記人之異說未足為據也若司尊彛六彛皆有舟所謂舟者偶有此名耳不必有深義若曰以此為戒則六彛盛鬱鬯以祼尸豈為神設戒而立此名與司尊彛皆有罍非與皆有舟為對也罍亦尊名所以盛三酒本非庋尊之物而陳氏與舟並論不唯穿鑿且謬誤矣天子之冕朱緑藻十有二旒陳氏曰藻旒或謂之繁露以其象然也漢制天子繅旒前長後短諸臣有前無後非古也按繁露之名不見經傳唯見汲冡周書王㑹篇董仲舒著書名繁露蓋以此又按冕旒本有前無後故此經及玉藻郊特牲皆云十二旒不云二十四旒也漢制天子藻旒前長後短鄭氏謂前後皆有旒此因玉藻前後邃延之文遂誤耳東方朔明言冕而前旒所以蔽明後旒將安所取耶陳氏謂前長後短有前無後者皆非古考之亦不詳矣禮記訓義擇言卷四
