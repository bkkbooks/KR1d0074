body:
  text: 禮記訓義擇言卷六婺源江永撰喪服小記斬衰括髮以麻為母括髮以麻免而以布鄭注母服輕至免可以布代麻也為母又哭而免朱子云拈髮是束髮為髻儀禮注疏以男女括髮與免及婦人髽皆云如著幓頭然所謂幓頭即如今之掠頭編子自項而前交於額上卻繞髻也呂氏云免以布為卷幘以約四垂短髮而露其髻於冠禮謂之闕項冠者必先著此闕項而後加冠故古者有罪免冠而闕項存因謂之免音免以其與冕辨之冕音相亂故改音問按免是凶服缺項乃士冠禮所用謂免即缺項擬非其倫且缺項唯著緇布冠用之若著𤣥冠未聞有缺項內則子事父母縱笄總髦冠緌纓皆詳而不及缺項可知𤣥冠無缺項也呂氏說未確又按程大昌泰之有袒免辨以免為免冠愚辨之附録於後辨曰喪服之免舊音問以布為之而程文簡以如字讀之謂凡免皆與冠對免之義但為去冠而非别有一物名為免也愚以為不然喪服小記云為母括髮以麻免而以布則免以布為之有明文矣程氏讀此免字亦如字又别為之解云父母皆當以麻括髮而古禮母皆降父故減用布示殺於父也此之謂免蓋應用而許其不用故特言免以明之然則此免又不為去冠而但謂免其麻括髮是自變其說矣又謂若如鄭氏說讀如問則居母喪者既括髮以麻而以布為免遂當以免而加諸齊衰之上則是降斬而齊遽著五世以外輕殺無服之冠豈其理乎愚謂為母喪而著免免者奉尸侇於堂之後未成服之前則然既成服自有七升之冠非即以布免為冠加諸齊衰之上也若嫌其同於五世以外之服則未成服之前主人免之時衆主人不辨親疏而皆免豈亦同於五世以外之服乎問喪篇云冠至尊也不居肉袒之體也故為之免以代之也既曰為之免以代之則必有一物加於首以代冠不可謂去冠以代冠也又曰免者以何為也曰不冠者之所服也既曰不冠者之所服則分明有布以繞髻否則何不直以免冠答問者乎小記謂既葬而不報虞則雖主人皆冠及虞則皆免正謂虞始變服以免代冠也若曰去冠豈可露首以臨祭乎小記又曰君弔雖不當免時也主人必免雖異國之君免也親者皆免此亦謂君弔必變服以免代冠也若曰去冠豈可露首以對君乎又免之非免冠考之奔喪之禮尤可見奔喪篇曰奔母之喪西靣哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰於序東凡括髮者必去冠既括髮於堂則首無冠矣而又言免於序東與奔父喪之不免者特異則免必有其物正小記所謂為母括髮以麻免而以布者也豈可以去冠釋之乎唯曲禮冠母免之免讀如字謂平時母露首非可以是概之喪服之免也喪服去飾之甚者為括髮為父為母皆以麻程氏遷就其說謂為母喪括髮以布豈不背禮經乎小記又曰男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽其文甚明親始死去冠而笄纚於是斬衰婦人則去笄而纚是婦人之去笄猶男子之去冠也齊衰喪既括髮而免婦人則髽婦人之髽猶男子之免髽必有其物則免亦必有其物也使去冠即為免則婦人之髽亦但為去笄乎如謂婦人有髽而男子但去冠豈制服反詳於婦人而略於男子乎今世喪禮雖簡略而五世親盡行弔於族人首必戴白猶古人之免也使免冠之說行皆露頂以臨喪豈禮也哉程氏又引周禮縣衰冠之式於門以證袒免之無體式此小宗伯之文也而夏官太僕則云縣喪首服之法於宫門鄭注云首服之法謂免髽笄纚廣狹長短之數是免髽等自有太僕縣之非無體式也程子引其一遺其一矣齊衰惡筓以終喪鄭注筓所以卷髮帶所以持身也婦人質於喪所以自卷持者有除無變按鄭注經文齊衰下當有帶字今注疏及諸本皆無帶字集說但言笄而不及帶皆非也男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽朱文端公云括髮免髽三者名異而制一始死去冠而露笄纚斂訖并笄纚去之故髮須括括收也收髮使不散也注謂以麻自項而前交於額卻繞於髻麻亦布也以未成布故謂之麻免髽亦以括髮其制同免則改用已成之布謂之免者以不冠得名髽亦以麻為之王廷相曰括髮免髽皆髽在內而以麻與布裹其外男主外故以外物為稱自麻與布言之也女主內故以內物為稱自髮言之也鄭注謂廣一寸馬季長謂廣四寸然取括髮則一寸不足馬說為當愚意濶四寸兩頭漸殺長足自項交前繞於髻又析其末可以結斯三者之制一也男子有括髮又有免婦人止一髽婦人質不變也按括髮免髽文端公說最詳晰疏引皇氏說謂髽有三種一麻髽一布髽一露紒之髽孔氏考校謂止有二髽麻布之髽皆得謂之露紒孔氏說是然則喪服經云女子子在室為父布總箭筓髽衰三年此總言女子首服有布總箭筓髽三物其實三年不常著髽必俟男免而後婦人髽也髽之制說見檀弓上大夫弔之雖緦必稽顙鄭注尊大夫不敢以輕待之按詳禮意止是尊大夫耳婦人為夫與長子稽顙其餘則否鄭注謂婦人恩殺於父母按婦人為夫斬衰三年為長子齊衰三年皆最重之服故稽顙其餘為父母降服及為舅姑期服皆不稽顙其餘中當亦兼舅姑也為父後者為出母無服孔疏云母子至親義不可絶父若猶在子皆為出母期若父沒後適子係嗣蒸嘗不敢以私親廢先祖之祀故不復為出母服按孔子雖為父後而為出母施氏服期者閔其無子異於有過而出者也子上之母出子思不使子上喪者别以義裁之也子思為父後得為母服者嫁母非出母也而立四廟劉氏云此句上有缺文當是諸侯及其大祖而立四廟按劉氏說可從然吳氏遽增諸侯及其大祖一句亦未可庶子王亦如之劉氏云此一句當在慈母與妾母不世祭也之下吳氏云按此說是也慈母妾母之子為君者至再世則不復祭其所生之母或有庶子立為王者其禮亦如之也謂此王妾别無它子則子之為王者嵗時為壇祭之使王族主其祭亦一世而止再世不復祭也按此說亦可從然亦當缺疑未可輒改經文也别子為祖繼别為宗朱文端公云自子孫言之為祖自族人言之則為宗為祖即為宗也曰繼别者謂世世繼此别子為大宗也按經文宗與祖異庶子不祭殤與無後者殤與無後者從祖祔食鄭注不祭殤者父之庶也不祭無後者祖之庶也此二者皆當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子爾無後者謂昆弟諸父也宗子之諸父無後者為墠祭之應氏曰殤與無後皆庶子之子也殤者幼而未成人無後者長而未有子鄭氏以殤為巳之子而繫於父之庶以無後為兄弟而擊於祖之庶蓋以殤唯適可祭今適子之下又有無後者不應更祭故指此為兄弟而言之夫所謂殤與無後包羅其義云爾非謂庶子之子其適與庶皆死也適子或殤而死或無後而死皆從祖而祭於宗子之家謂之祔食特祔焉而又食之非必同祭於祖按殤與無後者皆謂庶子之子當從應氏說又按注疏親者共其牲物而宗子主其禮曽子問所謂凡殤與無後者祭於宗子之家也從祖祔食謂從祖廟祭之即曽子問所謂當室之白尊於東房是謂陽厭者也非謂因祭祖而以殤祔祭也張子謂凡殤非適皆不當特祭惟當從祖祔食東滙陳氏亦謂當祭祖之時亦與祭於祖廟皆非是應氏謂從祖而祭於宗子之家非必同祭於祖亦得之但祔焉而又食之文義未安耳又按鄭注祖庶之殤則自祭之孔氏所謂已是父適得立父廟者是也張子謂已為其祖矣無所祔之然則庶孫又於何處祭其殤子乎親親尊尊長長男女之有别人道之大者也孔疏云此論服之降殺之義親親謂父母也尊尊謂祖及曽祖髙祖也長長謂兄及旁親也不言卑幼舉尊長則卑幼可知也按孔氏說是吳氏移此文屬於前條上殺下殺旁殺而親畢矣之下泥於三殺之分配而以親親専屬之子孫非是世子不降妻之父母其為妻也與大夫之適子同鄭注世子天子諸侯之適子也不降妻之父母為妻故親之也為妻亦齊衰不杖者君為之主子不得伸也應氏曰天子諸侯降其妻之父母而世子上不敢擬於尊者儲副未有君道也按服問云有從有服而無服公子為其妻之父母此經世子不降妻之父母對公子降妻之父母而言蓋公子厭於父降其妻為大功遂降妻之父母無服若世子之妻為繼體之配異於公子之妻其為妻服齊衰不杖期故妻之父母仍服緦也應氏謂世子不敢擬於尊者非是天子諸侯所不服者多矣何止妻之父母哉大功者主人之喪有三年者則必為之再祭朋友虞祔而巳鄭注謂死者之從父昆弟來為喪主有三年者謂妻若子幼少朱文端公云子少則以衰抱之何待大功朋友為之主乎此所言主人之喪者謂寡妻幼子力不能營辦喪祭大功同財朋友亦有通財之義故必為之資助且為之代拜賓非無後攝主比也按喪必有主以拜賓行祭子幼雖以衰抱之而攝主亦必代之拜虞祔練祥之祭皆須攝主行之若親友助資財營辦喪祭不論為主與否也生不及祖父母諸父昆弟而父稅喪巳則否鄭注謂子生於外者也父以他故居異邦而生己巳不及此親存時歸見之今其死於喪服年月巳過乃聞之父為之服已則否者不貴非時之恩於人所不能也孔疏云已在他國後生得本國有弟者謂假令父後又適他國更娶所生之子則為巳弟故有弟也王云以為計巳之生不及此親之存則不稅若此親未亡之前而巳生則稅之也劉知蔡謨等與王同而以弟為衍字按此經當從王肅之說若但以在他邦之故父稅喪而巳自若恐非人情計生年弟必在後而言弟者因昆連及之耳勿泥降而在緦小功者則稅之按此節本在君已除喪而后聞喪則不稅之下鄭氏正其誤謂宜承父稅喪已則否之下然猶有隨父稅喪之嫌竊疑此句之上當有小功不稅四字即檀弓篇曽子所譏者謂正服小功不稅而降在緦小功者則稅也因錯簡故脫一句除喪者先重者易服者易輕者鄭注除喪謂練男子除乎首婦人除乎要易服謂大喪既虞卒哭而遭小喪也其易喪服男子易乎帶婦人易乎首孔疏云先遭斬服虞卒哭已變葛絰若又遭齊衰之喪齊衰要首皆牡麻重於葛服宜從重而男不變首女不易要以其所重故也但以麻易男要女首是輕故也按此經注疏男不變首女不易要所易者男要女首則易服時男女首絰要絰皆麻是為正解此篇麻葛皆兼服之閒傳重者特注疏皆謂有葛者誤也斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同麻葛皆兼服之鄭注兼服之謂服麻又服葛也男子則絰上服之葛帶下服之麻婦人則絰下服之麻固自帶其故帶也所謂易服易輕者也兼服之文主於男子山隂陸氏云謂若斬衰卒哭男子變要絰以葛若又遭齊衰之喪則以齊衰之麻易葛帶其首絰猶是斬衰之麻女子更首絰以葛若又遭齊衰之喪則以齊衰之麻易葛絰其要絰猶是斬衰之麻是之謂兼服何也斬衰之葛與齊衰之麻同故也下倣此鄭氏謂服麻又服葛誤也朱文端公云兼服當從陸氏解所謂易服易輕者是也以後喪之麻易前喪受服之葛而大小之制仍不改乎前是以麻包葛非服麻又服葛也按前經易服者易輕者注疏男女首要皆有麻無葛正如陸氏之說至此經注則謂服麻又服葛前後抵牾蓋誤解兼服之文耳兼服之者謂男子以後輕喪之麻帶易前重喪之葛帶女子以後輕喪之麻絰易前重喪之葛絰是以麻而兼葛兼之為言包也亦即閒傳輕者包之意非謂服麻又服葛也鄭又誤解閒傳重者特謂男子之絰婦人之帶特其葛不變之既不變則仍麻矣今乃以葛易之何謂不變乎蓋重者特謂男麻絰女麻帶特留之不易也若如鄭氏說則男子重首婦人重帶反以後輕喪而易麻為葛不亦悖乎且此經注婦人固自帶其故帶兼服之文主於男子而閒傳注又謂婦人之帶亦特其葛不變之前後不又抵牾乎陸氏此章正鄭注之誤最有功又按此經注疏本作麻葛皆兼服之而儀禮經傳通解及陳氏集說吳氏纂言諸本皆作麻同皆兼服之蓋傳寫之誤大夫不主士之喪朱文端公云此亦可疑假而大夫之外别無親將奈何按大夫之外别無親其如雜記所謂前後家東西家又無有則里尹王之乎夫為人後者其妻為舅姑大功孔疏云賀民云若子出時未昏至所為後家方昏者不服本舅姑以婦本是路人來又恩義不相接熊氏云夫為本生父母期其妻降一等服大功是從夫而服不論識前舅姑與否假令夫之伯叔在他國而死其婦雖不識豈不從夫服也按文端公云熊氏論最當愚謂夫之身有所從生安得謂無恩義賀氏說甚謬繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居鄭注録恩服深淺也見同財則期同居異財故同居今異居及繼父有子亦為異居則三月未嘗同居則不服孔疏云異居其别有三一者昔同今異二者今雖共居其財計各别三者繼父更有子便為異居則服齊衰三月而已今言有主後為異居謂繼父更有子也舉此一條餘亦可知然既云皆無主後為同居有主後者為異居則此子有子亦為異居也朱文端公云喪有無後無無主無後謂無為之後者無主謂無大功以上親為之喪主今父死有子不得謂無後然子幼不能自為主必大功以上之親為之主如所謂大功者主人之喪是也既無主則雖有後而煢煢無依猶無後也無主無後則祖考之祀絶矣有能撫此孤而存其祀者即魏人所云四孤當為公嫗服而世世祀之别室者也況其母之所適欲不父之而喪之可乎必曰皆無主後者使此繼父有子或無子而有大功之親則無藉此子之服之矣然雖限於制不得為之期而生死肉骨之誼終不可忘喪服所云齊衰三月其為是與疏分異居為三其最謬者以為主後為専指繼父有子不知喪服傳云兩無大功之親重在子家無主後若繼父有主非不可為服謂不必為服也又云此子有子亦為異居是又誤以後為子之後矣子之有後無後於繼父何與乎至今不同居之說亦大可疑方其幼孤依人為活繼父撫育成立與之同財而祀其祖禰今之有身有家無覆先人之祀者伊誰之力死而路人視之於理安乎記云必嘗同居其非今同居可知蓋成立則必歸家者猶未也必其繼父未能同時而使祀其祖禰反不可謂同居也喪服傳以其貨財為之築宫廟謂築宗廟於其家注謂築於寢門外非也故兄為繼父服期者皆昔同室而今不同室者也按此經文端公論之雖詳然猶有未盡也按喪服傳云夫死妻稚子幼子無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宗廟嵗時使之祀焉妻不敢與焉若是則繼父之道也同居則服齊衰期異居則服齊衰三月蓋此子若有親者撫育則不必從母適人惟無大功之親是以從母他適賴所適者撫育之而所適者亦無大功之親是以與此子同財而又為之築宫廟使之祭祀則繼父之恩深矣如是者如同居繼父服齊衰期若此子賴其撫育而彼自有親者享其財或繼父先未有子而後生子則此子亦不得分其財是為先同居而後異居其恩淺者服輕為服齊衰三月若初未從母適人則無恩不服矣此條亦約喪服傳之文以釋經必嘗同居則與之適人也若無主後即兩無大功之親也同財而祭其祖禰即所適者以其貨財為之築宫廟嵗時使之祀也傳言無大功之親而此約言之曰無主後蓋大功之親可主人之喪也傳舉疏以包親無大功以上之親則無後可知矣適人之子雖為父後而稚不能主喪又無大功以上親主之則亦若無主後者故以皆概之其實同居異居之别不在已之主後而在所適者之主後故云有主後者為異居謂所適者有主後也有主後則不同財而祭其祖禰可知舉有主後可該不同財也疏家泥皆字增出此子有子亦為異居一義則以辭害意矣假令繼父既與之同財而祭其祖禰又為之娶婦生子則恩愈深反以巳有子而殺為齊衰三月於義豈有當乎文端公謂疏誤以後為子之後誠然謂傳意重在子家無主後疏専指繼父有子者為最謬恐未必然子家無主後賴繼父撫孤而存祀此同居繼父與異居繼父所同也服異居繼父齊衰三月等於巳之髙曽祖父正為報其撫孤存祀之恩也所以異於同居繼父者謂不同財而祭其祖禰耳所以不同財而祭其祖禰者謂繼父自有主後耳以此審之兩種繼父恩之淺深豈不係於繼父主後之有無乎經云有主後者為異居言簡義該而鄭注亦専言繼父有子也文端公又辨昔同居今異居之說亦恐未然所謂昔同居者謂隨母適繼父受其撫育之恩也今異居者繼父自有主後不與之同財而祭其祖禰也記言必嘗同居此亦異居繼父所同必皆無主後同財而祭其祖禰乃盡同居繼父之道否則為昔同而今異者矣必嘗同居然後為異居此别于全未嘗同居者耳然謂即與之同財而祭其祖禰也先同而後異者服齊衰三月未嘗視為路人也文端公論此經猶有未徹者兩種繼父恩之淺深未嘗較論分明其所以為異居者由於不同財所以不同財者由於繼父有主後未嘗推論的確也若鄭注喪服謂築宫於寢門外此語亦未為失此因下文妻不與意其即在繼父家築宫廟耳文端公謂成立則必歸家所謂築宫廟者謂築宫廟於其家此亦太泥倘此子無家可歸終身在繼父家繼父為築宫廟於寢門外豈反不得為同居乎文端公謂凡為繼父服期者皆昔同室而今不同室者也正與疏注相反愚謂凡為繼父服期者必繼父無主後與之同財而祭其祖禰者也若此子歸家與不歸家非所論也或因繼父有子固不能與異姓之子同財矣萬一繼父甚愛此子令與巳子均財此可為同居繼父乎曰以經文有主後者為異居言之雖分財猶為異居繼父也父有子為主後則異姓不可干之如以均財之故而親之是以利言也故異居繼父一以有主後為斷蓋以義斷恩也以此益知經語之簡而該注疏别為三種是未逹經㫖也又按自孔疏有已有子亦為異居之說後世相沿著之禮律將有實為同居繼父因已有子遂為異居者恩義不明服制乖違所當改正者也妾祔於妾祖姑按此經有妾祖姑又後言祖姑有三人則古者有子之妾及再嫁之婦其主皆得入廟但不知廟主若何位置饗神祝辭若何稱謂耳再考之婦人不立主其祔廟蓋以其神祔之雜記主妾之喪則自祔云云疏引庾蔚云妾祖姑無廟為壇祭之此說是慈母與妾母不世祭也吳氏云慈母謂父命無母之妾子以有子而死之妾為母者也妾母謂妾之自有子者也諸侯無適子或立此二種妾之子為君而其妾别無它子則其子之為君者嵗時為壇以祭其所生之母使庶公子主其祭然此君祭此妾母止在當身至此君之子則不復祭之矣春秋榖梁傳所謂於子祭於孫止是也朱文端公云妾祔於妾祖姑無則中一以上若妾母不世祭安得有髙祖之妾可祔乎天子諸侯上及祖廟之重亦當使庶子世世主其祭何得自身而止意此妾母或身受恩慈而未有為子之父命或本無子而非先有後無既受恩慈自當為壇以祭使庶子主之及身而止決非所生之母也按注疏與吳氏說皆據榖梁傳而文端公即據此記言祔祭者駁之禮家之說雜出自是不能齊一以人情而言庶子為君安能不自祭其母又安能及身而止榖梁傳但據考仲子之宫謂禮庶子為君為其母築宫而魯十二公多為妾子未見皆為其母築宫也雖有此禮乖於人情度亦不能行矣文端公謂妾母必非所生母此說姑存之丈夫冠而不為殤婦人筓而不為殤為殤後者以其服服之鄭注言為後者據承之也殤無為人父之道以本親之服服之孔疏云謂大宗子在殤中而死宗不可絶族人為後大宗而不得後此殤者為子以父無殤義故也既不與殤者為子則不應云為後據已承其處為言應服此殤以兄弟之服東滙陳氏云男子亦有不俟二十而冠者冠則成人也此章舉不為殤者言之則此當立後者乃是已冠之子不可以殤禮處之其族人為之後者即為之子以其服服之子為父之服也舊說依兄弟之服服此殤非也其女子已筓而死則亦依在室之服服之不降而從殤服也朱文端公云殤而為之後或疑其服與凡為後者有間故明其服之如常以所後雖是十九嵗以下之殤然當其生時則已冠矣凡男女已冠筓不為殤故可為之後而以其服服之注疏解未當按當從陳氏及文端公說庶子在父之室則為其母不禫鄭注妾子父在厭也孔疏云此謂不命之士父子同宫者也若異宫則禫之山隂陸氏云禫服之細也雖奪之可在父之室謂未娶者也巳娶雖同宫猶禫按禫主於祭陸氏謂服之細非也又謂巳娶同宫猶禫亦無據近世字書改禫從衣而廢禫字甚謬諸侯弔必皮辨錫衰孔疏云一謂此弔異國臣若自弔已臣則素辨環絰錫衰也一云自弔巳臣而未當事則皮辨錫衰至當乃辨絰山隂陸氏云言必者著諸侯弔無內外皆當如此然則天子弔服與諸侯異歟天子重絰諸侯重衰天子弔服皮辨加環絰諸侯弔必皮辨錫衰按孔疏二說皆可通以前說為正經文不曰君而曰諸侯據異國之君言之也陸氏天子重絰諸侯重衰之說未確王之三衰司服有明文豈有弔公卿首著辨絰而身不錫衰者公為卿大夫錫衰以居當事則辨絰服問有明文豈有諸侯弔巳臣當事而無絰者又所謂辨絰者如爵辨而素加環絰非皮辨也而陸氏誤以為皮辨豈未讀司服注疏乎養有疾者不喪服遂以主其喪非養者入主人之喪則不易巳之喪服朱文端公云所養者亦五服之旁親以其尊也故釋巳服而養之所謂巳喪期大功以下既葬卒哭斬衰既練而後故得為旁親養若未練未葬則使人養而已不親養已所服之喪或疾者之所不服或疾者有服而已除服故釋服若所養者亦有喪而服則養者不必不喪服即所養者别有喪但彼既喪服養者亦不必不喪服所養者死而為之服其服或輕於已本有之服或同於本有之服或反重於本有之服重則服其服同而巳服已變而受亦服其服若同而已服未變或輕於巳服則於後死者初成服及當事拜賓服其服不當事拜賓仍服已服故曰遂以主其喪主謂拜賓為主時也不易巳服者謂初入為主也初入者本無服則素服有服則不易服至新死者三日成服則釋本有之服而服其服成服後已服重者亦惟當事拜賓服其服不拜賓仍服已重服若本有之服輕於新服或巳變殺則當服後死者之新服惟當巳喪變除時服已喪之服按文端公推說詳盡文理密察權衡精矣妾無妾祖姑者易牲而祔於女君可也鄭注女君適祖姑也易牲而祔則凡妾下女君一等方氏云妾祔嫌於隆故易牲而祭以示其殺焉按易牲者不敢以卑牲祭女君是隆女君也方氏謂示其殺非也士不攝大夫士攝大夫唯宗子鄭注士之喪雖無主不敢攝大夫以為主宗子尊可以攝之山隂陸氏云若應大夫主喪雖無大夫士不得攝吳氏云陸說於文為順此言大夫死無主後其親屬有為士者位卑不可攝而主其喪唯宗子為士分尊故可以士而攝大夫之喪也按此經當從陸氏吳氏說攝者以卑兼尊之辭又按攝主亦不必死者無主後亦有喪主在外未歸而攝者婦祔於祖姑祖姑有三人則祔於親者鄭注祖姑有三人謂舅之母死而又有繼母二人也親者謂舅姑所生張子云祔葬祔祭只合祔一人譬之人情豈容二妻以義斷之須祔以首娶再嫁别為一所可也朱子云程氏祭儀謂凡配只用正妻一人或奉祀之人是再娶所生即以所生配謂凡配只用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再嫁之子乃許用所生配而正妻無子遂不得配祭可乎程先生此說恐誤唐㑹要中有論凡是適母無先後皆當並祔合祭與古者諸侯之禮不同夫婦之義如乾大坤至自有差等故方其生存夫得有妻有妾而妻之所天不容有二況於死而配祔又生存之比橫渠之說似亦推之有太過也只合從唐人所議為允況又有前妻無子後妻有子之礙其勢將有所杌隉而不安者唯葬則今人夫婦未必皆合葬再娶别營兆域宜亦可矣按祖姑有三人則先後娶者皆得入廟祭之古今人情不異朱子斷從唐㑹要之說不可易矣祔祭與正祭不同祔為新死者之從其班是以祖姑有三人宜祔於親者正祭則不可但及其親而不配其非所生者也其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲鄭注不易牲以士牲也此謂始來仕無廟者無廟不祔宗子去國乃以廟從山隂陸氏云祔於其妻即是祔於其祖蓋妻未有不祔於祖姑者也鄭氏謂始來仕無廟者誤矣應氏云此據妻之生死同夫榮辱而立文注以祔於其妻則為始仕而未有廟亦未必然正使新徙它國而為大夫亦必有廟既不立祖廟豈敢為妻立廟乎按祔於其妻皆謂夫為其妻行祔祭之禮也而疏謂其夫不為大夫而死誤矣鄭注謂始來仕無廟方氏應氏正其失亦是又按鄭注不易牲者以士牲是也王制云大夫廢其事終身不仕死以士禮葬之死而以士禮葬則其生存宜以士禮為其妻行祔祭士則猶有禰廟祭祖父而其妻得於禰廟祔祖姑矣又按注謂無廟者不祔然則庶人無廟將不行祔祭乎竊意庶人無廟而薦於寢寢亦有祖考之靈存焉男子當於寢祔祖婦人當於寢祔祖姑又妾祔妾祖姑妻祖姑無廟先儒有為壇而祔之說見雜記疏既葬而不報虞則雖主人皆冠及虞則皆免鄭注不報虞謂有故不得疾虞雖主人皆冠不可久無飾也皆免自主人至緦麻也山隂陸氏曰既葬而不報虞此言過期而葬也蓋葬曰虞如期而葬則如期虞也不及時而葬渴葬也過時而葬慢葬也故禮使報其虞以責子道朱文端公云檀弓葬日虞不忍一日離也葬已踰期矣而又後其虞是失禮之中又失禮也先王教孝當不如是此記所云或葬後有故而不及虞或葬先母虞待父也按鄭注有故不得疾虞其說不可易文端公又兼父母之喪偕者言之尤備陸氏說失之奔母之喪不括髮祖於堂上降踊襲免於東方絰即位成踊孔疏云奔母之喪初時括髮至又哭以後至成服不括髮袒於堂上降踊與父同父則括髮而加絰母則不括髮而加免此是異於父也按奔母喪初時括髮有奔喪正篇可考又此記篇首為母括髮以麻免而以布亦可參見然不言初至時括髮但據又哭時云不括髮亦記者失之不若奔喪篇之詳備也禮記訓義擇言卷六
