body:
  text: 禮記訓義擇言卷二婺源江永撰檀弓上檀弓免焉陸氏釋文云免音問以布廣一寸從項中而前交於額上又卻向後繞於髻按免當音問程氏大昌讀如字謂去冠别有辨見喪服小記篇左右就養無方饒氏云養不止飲食之養言或左或右無一定之方按當從饒氏說季武子成寢杜氏之葬在西階之下按檀弓記事在戰國之初距季武子巳逺此事蓋得之傳聞意武子作别宅其地先有杜氏之葬傳聞失實遂謂武子之居寢耳居寢之階下許人合葬情理所無者也子上之母死而不喪按子之先君子喪出母謂孔子也孔子之父先娶施氏無子而出後娶顔氏生孔子其後施氏卒孔子猶為之服出母之服蓋閔其無子也所謂道隆則從而隆也舊說皆謂伯魚之母出伯魚猶為之服誤矣此因伯魚之母死期而猶哭一章遂傳誤期而猶哭夫子謂其甚乃是裁其過禮耳伯魚之母未嘗出也近世豐城甘紱始為辨明孔子曰拜而後稽顙頽乎其順也稽顙而后拜頎乎其至也三年之喪吾從其至者吳氏云周官九拜之目今約之為三一曰拜先跪而膝著地次拱兩手到地乃俯其首不至於地其首懸空但與腰平荀子所謂平衡曰拜是也周官謂之空首尚書謂之拜手與凡傳記單言拜字者皆謂此拜也此拜之正也故得専拜之名二曰頓首先兩膝著地次兩手到地乃俯其首下至於手此拜之加重者三曰稽首兩膝著地兩手到地乃俯其首下至於地在手之前首下腰高如衡之頭低尾昻荀子所謂下衡曰稽首是也此拜之最重頓首亦首下腰高然頓首首但至手稽首首直至地比之頓首其首彌下故下衡特於稽首言之稽顙即是稽首以其為凶拜故易首為顙以别於吉禮云爾凡喪之再拜者先作空首一拜則曰拜而后稽顙九拜中此名吉拜輕喪之拜用此先作稽首一拜後作空首一拜則曰稽顙而后拜九拜中此名凶拜重喪之拜用此按頓首稽首之别周禮疏謂頓首者頭叩地即舉稽首者頭至地多時此為確詁荀子謂平衡曰拜下衡曰稽首此舉稽首包頓首未可因此一語遂謂頓首頭不至地也周禮注空首拜頭至首所謂拜手也吳氏謂空首手至地首不至地頓首手至地首不至手則頓首與舊說空首無異矣舊說以頭不至地為空吳氏以頭不至手為空此亦當從舊說但俯首空懸其九拜之振動乎稽顙頭觸地無容問喪篇有明文與稽首之拜從容引首至地遲留而後起者大異乃謂稽顙即稽首以凶服無容之拜同於臣對君至恪之拜害理甚矣又空首之拜可該竒拜褒拜而九拜最輕者為肅拜則不可該約九拜為三終未確肅拜即今男子之長揖古者為婦人之拜及軍中介者之拜孔子既得合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓按周封三王之後本欲使之行其舊俗兼存先代聖王之法夫子之先宋人固得用殷之禮自防叔去宋遷魯至夫子巳在三世之外則亦可從新國之法是以夫子於殷禮周禮從違之事如殷既封而弔周反哭而弔則謂殷已慤吾從周殷練而祔周卒哭而祔則謂周巳戚吾從殷論周禮之郁郁乎文則志在於從周論後進之文過其質則欲從乎先進少居魯則衣逢掖之衣長居宋則冠章甫之冠即他日以兩楹間之夢告子貢亦從殷人殯於兩楹之間禮也凡此皆斟酌古今而行之從周者多而從殷者亦間有也合葬本非古自周公以來未之有改夫子以夫婦生而同室死而同穴為合於人情故從之且謂衛人之離不若魯人之合者為善也若夫古人略於墓而詳於廟殷周皆然而殷人於墓且不墳不墳則無崩壞之虞無修墓之事此殷人崇質尚儉之俗亦欲順地道安靜不欲驚其體魄也夫子非不欲從古者不墳之制然自度他日不免從事四方宜墳之易於識别是以從今日丘封之制崇四尺蓋古禮也當封時亦既見其崇四尺矣先反而修虞事以餘功委之門人不料雨甚而崩也墓之崩非先時築土之不堅亦非門人董事之不謹新土方成驟雨淹漬門人即時修之而後反度其崩亦未甚也夫子聞言驚怛泫然流涕而曰古不修墓蓋古所以不修墓者以其不墳也今不得巳而墳以墳之故而崩以崩之故而修夫子蓋自悼其不能從殷致有違禮之事因以是知古者墓而不墳古人自有深意存其間也先儒因疑孔子少孤章并疑及此章今反覆此章以合葬發端以吾聞古者墓而不墳吾聞古不修墓為起訖竊謂記者微㫖在乎殷周從違之間故總合夫子一生從周從殷之志而備論之如此讀者當於言外得之若夫新墳之崩由於雨甚此非人事之咎不必為門人疑亦不必為夫子疑又謂夫子時年十七豈有門人歷聘紀年夫子二十四嵗而母卒非十七也喪三年以為極亡則弗之忘矣故君子有終身之憂而無一朝之患故忌日不樂朱文端公云喪有盡而哀無窮雖親死巳久而追慕之情終身弗忘於何見之於忌日不樂見之也一朝之患句不重蓋古有此語連引及之注以患為滅性未是按文端公說最當孔子少孤不知其墓殯於五父之衢人之見之者皆以為葬也其慎也蓋殯也問於郰曼父之母然後得合葬於防陳氏云聖人人倫之至豈有終母之世不求父葬之地至母殯而猶不知父墓者乎朱文端公云禮經之謬無過於此亟當刪之按此章為後世大疑本非記者之失由讀者不得其句讀文法而誤也近世高郵孫邃人謂不知其墓殯於五父之衢十字當連讀為句而蓋殯也問於郰曼父之母為倒句有禆於禮經者不淺蓋古人埋棺於坎為殯殯淺而葬深孔子父墓實淺葬於五父之衢因少孤不得其詳但見墓在五父之衢不知其為殯也如今人有權厝而覆土掩之謂之浮葬正此類也五父衢墓不惟孔子之家以為巳葬即道旁見之者亦皆以為巳葬至是母卒欲從周人合葬之禮卜兆於防惟以父墓淺深為疑如其殯而淺也則可啓而遷之若其葬而深也則疑體魄已安不可輕動其慎也蓋謂夫子再三審慎不敢輕啓父墓也後乃知其果為殯而非葬由問其郰曼父之母而知之蓋唯郰曼父之母能道其葬之詳是以信其言啓殯而合葬於防蓋殯也句當在問於郰曼父之母下因屬文欲作倒句取曲折故置在上猶首章檀弓免焉本當在仲子舍其孫而立其子之下乃倒置在上檀弓固有此文法也自史遷以來讀者皆誤以不知其墓為句遂為後世大疑耳又按襄十一年傳盟諸僖閎詛諸五父之衢讀者或疑五父衢為城中四逹之道其上不得有墓將奈何曰五父衢不在魯城中故杜注云五父衢道名在魯國東南不云魯城內也定八年陽氏戰於南門之內弗勝又戰於棘下陽氏敗陽虎說甲如公宫取寶玉大弓以出舍於五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余由此觀之虎城內戰不勝而後出舍五父之衢可知五父衢必在城外也衢在城外道旁有墓固無可疑也或又疑夫子父墓固不知其詳豈夫子之母亦不知其為殯與曰當其父之殯也夫子幼而顔氏少不親見其實土之淺深是以遂謂為巳葬也郰曼父者意其為郰人也殯郰大夫而郰人親其役是以曼父之母得其詳耳夏后氏尚黑大事斂用昏戎事乘驪牲用𤣥殷人尚白大事斂用日中戎事乘翰牲用白周人尚赤大事斂用日出戎事乘騵牲用騂大事謂喪事也陳氏云禹以治水之功得天下故尚水之色湯以征伐得天下故尚金之色周尚赤取火之勝金也吳氏云夏以金德王而尚水之色水者金之所生周以木德王而尚火之色火者木之所生夏周之道先親親故以我所生而相者為所尚殷以水德王而尚金之色金者水之所從生殷道先尊尊故以我所從生而休者為所尚大事當從鄭注以為喪事者是按三代所尚之色陳氏說為長鄭注未確吳氏說則鑿矣大事從鄭說為長長樂陳氏引祭義以祭為大事方氏謂喪戎祀為大事雖可通然非此章所指魯莊公及宋人戰於乘丘縣賁父御卜國為右馬驚敗績按敗績謂車覆左傳子産曰未嘗登車射御則敗績厭覆是懼非謂師皆敗也士之有誄自此始也吳氏云誄者述其功行以哀之之辭如後世祭文之類鄭注每解誄為諡非也按吳氏說是哀公誄孔子未嘗有諡方氏謂有誄則有諡非也童子曰華而睆大夫之簀與按朱子嘗云季孫之賜曽子之受皆為非禮或者因仍舊習常有是事而未能正耳而吳氏謂禮制寢簟未聞有差等亦有理魯婦人之髽而弔也按鄭注以髽為露紒恐未確髽蓋類於免以下章毋從從毋扈扈者推之從從謂前太高扈扈謂邊太廣今人以布廣充幅方裁而斜叠之自額結於項前有尖角又或摺去尖角俗謂之包頭豈古髽之遺象與髽有麻有布斬衰麻髽齊衰布髽南宫縚之妻之姑之喪夫子誨之髽曰爾毋從從爾爾毋扈扈爾孔疏云言期之髽稍輕自有常法毋得從從太高扈扈太廣按注疏於高廣未詳言其制愚意高謂前當胸者廣謂所叠之邊期之髽毋太高太廣則斬衰之髽宜高廣又按婦人髽猶男子免免之制宜亦有高有廣舊說謂以布一寸自項中而前交於額却繞髻者恐其太狹非古制也孔子既祥五日彈琴而不成聲十日而成笙歌鄭注十日成聲歌踰月且異旬也祥亦凶事用逺日五日彈琴十日笙歌除由外也琴以手笙歌以氣孔疏云祥是凶事用逺日故十日得踰月若其卜逺不吉則用近日雖祥後十日亦不成笙歌以其未踰月也吳氏云不成聲謂不終曲也按此章與朝祥莫歌章踰月則善之云似相妨如注疏說方可通陳氏集說及吳氏說皆不載注疏用逺日之說失之矣死而不弔者三畏厭溺按此章多異論長樂陳氏謂君子之所不弔者不止此臨川王氏謂畏而死者雖有罪愚人亦不得不哀傷之張子謂三者可傷尤甚但致哀死者不弔生者慈湖楊氏謂非不弔也不忍為弔辭應氏謂情之厚者豈容不弔但其辭未易致耳朱文端公辨之曰按孔氏云非理橫死謂非理而橫死於畏厭溺非謂畏厭溺者皆非理橫死方氏云三者之死皆非正命謂非正命皆不弔非謂三者之死盡非正命也非正命者不弔正命者可不弔乎又弔與哭異經言弔不言哭明非九族五服之親也經文本無可疑先儒紛紛詆議又或曲為之說俱不通之論此說善矣樂樂其所自生禮不忘其本按樂非必鐘鼓弦歌也樂者人情之歡樂也人情安樂於所生如離故土即不樂矣禮不忘本重古初也曽子之喪浴於爨室按曽子易簀當在適室喪事由近即逺安有遷尸而浴於他室者此必有誤字疑是奧室之訛禮器臧文仲燔柴於奧爨可訛為奧則奧亦可訛為爨士喪禮始死設牀當牖本不當奧蓋門人欲尊其師謂室中以奧為尊故設牀於奧以浴記此譏其變禮室當為衍字又或本作室奧因奧訛爨故遂改作爨室耳大功廢業或曰大功誦可也孔疏云業謂所學習業學業則身有外營思慮它事恐其忘哀故廢業朱文端公云謂士人所習之業如講道論德射御書數之類廢業謂未葬以前既葬則期以下飲酒食肉豈復廢業按文端公從疏說推廣之疑此說得之先儒陳氏游氏皆以廢業為不習樂而朱子則謂業為簨上版廢業者不敢作樂也恐非定說曽子曰小功不為位也者是委巷之禮也子思之哭嫂也為位申祥之哭言思也亦然吳氏云子思申祥哭無服之親猶且為位況小功有服之親而不可為位乎為嫂無服而其妻為婦似婦則有服為妻之兄弟無服而其妻為其兄弟則有服故子思申祥皆使其妻有服者倡踊於前而巳無服者隨服於後也按此以二子哭無服得禮之事明小功不為位之非禮吳氏說得之無譏申祥之意而馬氏謂申祥哭言思非禮引下篇妻之昆弟為父後者死哭之適室子為主袒免哭踊以明婦人不得倡踊愚謂妻之昆弟固當以子為主或申祥是時未有子又或幼不能為主則其妻當倡踊矣古者冠縮縫今也衡縫故喪冠之反吉非古也鄭注今冠橫縫以其辟積多解時人之惑喪冠縮縫古冠耳孔疏云殷以上質吉凶冠皆直縫直縫者辟積褶少故一一前後直縫之周世文冠多辟積不復一一直縫但多作褶而并橫縫之周吉冠文故多積褶而橫縫若喪冠質猶疏辟而直縫是喪冠與吉冠相反而時人因謂古時亦喪冠與吉冠反故記者釋云非古也正是周世如此耳古則吉凶冠皆從縫長樂陳氏云一幅之材順經為辟積則少而質順緯為辟積則多而文順經為縮縫順緯為橫縫長樂黃氏云斯蓋作記之人指亂世之禮不本周公之制周公古禮喪冠直縫吉冠橫縫而衰世喪冠亦皆橫縫失禮無别故歎之曰喪冠之反吉非古是後之喪冠反同吉冠為非古正文患喪冠無别注義患喪冠與吉冠異制誤辨其㫖按古者喪冠廣二寸見儀禮喪服篇賈疏則吉冠當亦如之非若後世之帽盡舉頭而䝉之也聶崇義三禮圖喪冠廣三寸巳非古制矣秦始皇自謂以水德王改冠六寸於是冠梁始濶至漢又增為七寸故漢輿服志云委貌冠皮辨冠同制長七寸高四寸制為覆杯前高廣後卑鋭此以委貌同皮辨如後世之帽於是古冠制盡失唯喪冠略存制耳縮縫狹辟辟積必少橫縫長辟積必多而陳氏乃謂順經為辟積則少順緯為辟積則多是但以布論而不以冠梁之廣狹長短論誤矣又冠之辟積與裳異裳用辟積蹙其要中使狹冠之辟積所以為飾即古冠直縫三辟積質中已有文而文端公謂頂窄於武故於其上為辟積使上狹下寬亦非古人用辟積之意古冠以一條布作穹形雖縱橫皆不為辟積亦未嘗不可非謂必作辟積然後上狹下寬也其云考古冠制以布一幅為冠上連頂下屬武此非古冠制繪禮圖者誤以後世之帽當古冠耳又考文端公家禮圖附論云斬衰冠禙厚紙為冠梁廣三寸長足以跨頂用稍細麻布裹之就摺其布為細㡇之三條直過梁上其㡇俱向右是謂三辟積其梁之盡處兩頭俱捲屈向外以及武是謂外畢此猶得古人喪冠之制此經附注非公定說也此經當從注疏說而黃氏謂今喪冠亦橫縫如此則當言喪冠同吉非古何以云反吉乎反同於吉非反字之義且喪冠縮縫尚有左右之異斬衰右縫大功以下左縫使易為橫縫則無左右矣恐當時改制未至無别若斯也吉冠橫縫使異於喪冠自是周人隨時改制得宜處記者恐人見末而忘本謂今人但知吉冠之與喪冠相反不知古時吉凶皆同為縮縫耳其曰喪冠之反吉自是屬辭之體如是蓋用倒句也曽子曰小功不稅則是逺兄弟終無服也而可乎疏云曽子仁厚禮雖如此猶以為薄故怪之此據正服小功也故喪服小記云降而在緦小功則稅之清江劉氏云小功不稅亦不吉服而巳矣記曰聞逺兄弟之喪既除喪而後聞之則袒免哭之成踊夫若是奚其吉哉雖然降而無服者麻不稅是降而無服矣哀之以其麻哭之以其情逾月然後巳其亦愈乎吉也按曽子之說於禮厚矣劉氏所以折衷之者亦善伯高之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高疏云冉有代孔子行弔非孔子本意故云空使我不得誠信行禮於伯高吳氏云以冉氏之物而假作孔子之名以與人是虛僞不實朱文端公云不誠謂束帛乘馬非本意所欲所謂儀不及物也按當從文端公說伯高死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野吳氏云兄弟之喪周之禮哭諸寢而此云哭諸廟師之喪周之禮哭諸廟門外而此云哭諸寢蓋孔子所定也孔疏皆指為殷禮孔子惡野哭者而此之所知哭諸野彼之野蓋謂國門外之郊野此之野蓋謂稍逺於寢門外空閒之地無室屋處非郊野之野按吳氏說優於孔疏衰與其不當物也寧無衰鄭注惡其亂禮不當物謂精粗廣狹不應法制孔疏云物謂升縷及法制長短幅數也按寧無衰記者甚言之非真謂衰可無也不當物注疏說是長樂黃氏謂物者心貌哀戚之實非也齊衰不以邊坐鄭注邊偏倚也張子云有喪者専席而坐也按當從注說専席而坐謂不與人共坐非不以邊坐之謂也子惡夫涕之無從也小子行之孔疏云既為出涕當有厚施惠豈得虛然客行更無他物可易此馬故將驂馬行之副此涕淚吳氏云從者以外物副以內誠之謂有哀涕而無賻物是涕之無從也陳氏云從自也今若不賻則是於死者無故舊之情而此涕為無自而出也按無從之說孔疏吳氏得之聖人豈有無自而出之涕必藉物以明其誠乎陳氏說非是其往也如慕其反也如疑鄭注慕謂小兒隨父母啼呼疑者哀親之在彼如不欲還然按如慕如疑鄭注最得其情狀又問喪篇鄭注云慕者以其親之在前疑者不知神之來否此說亦善孔子與門人立拱而尚右張子云叉手以右手在上也按從張子說孔子蚤作負手曵杖消搖於門吳氏云此文所載事辭皆妄按杖有拄時亦有曵時負手曵杖而消搖固非有意為之亦不可謂變其常度有損於動容周旋中禮也夫子他時有感而作歌如龜山猗蘭者多矣此感於夢而作歌情理有之非自悲其死也聖人固知命安死而死者人之終自是大事必謂以晝夜視死生泊然不一動念則亦老莊之見耳夫子固不自聖然嘗言天生德於豫又云文不在兹乎其自知自任不淺矣於將終而自比泰山梁木稱哲人何足病乎聖人固清明如神然於死生非别有前知之術其能前知者正因有所感耳必謂不待占夢而後知將謂聖人亦同二氏之知死乎吳氏之疑過矣孔子之喪公西赤為志焉飾棺牆置翣設披周也設崇殷也綢練設旐夏也孔疏云夫子用三代之禮不為僭者用其大夫之禮耳必用三禮者夫子德備三代文物故也朱文端公云葬聖人而兼用三代之禮無乃巳僭聖門賢弟子必不出此按三代之禮皆聖王所制周封二王之後固欲兼存之如士喪禮尚有夏祝商祝之名以其習於夏殷之禮故名之當時未必有禁令不許用夏殷也夫子嘗學二代之禮歎文獻之無徴考其生平亦有從殷禮者矣所謂僭者下僭上也為大夫而用大夫之禮則非僭也以三代之禮葬孔子當時曽子子貢子游子夏之徒必熟議而後行豈以僭事聖師哉孔子之喪二三子皆絰而出羣居則絰出則否鄭注羣謂七十二弟子相為朋友服山隂陸氏云二三子蓋謂七十子知師之深者也孔子之徒三千羣者不在七十子之列者也張子云羣居則絰出則否喪常師之禮也絰而出特厚於孔子也吳氏云鄭陸二說不同然皆當斷羣字為一句疑未妥竊意記者先記孔子弟子為師之特禮又記凡為師與朋友弔服加麻之常禮於後以表出不釋絰者之為特而非常也張子說優按鄭說為優喪服記朋友麻注亦引此文謂朋友相為服緦之絰帶其服為弔服疑衰素裳但此經不當以羣字為句羣居謂朋友同羣而聚處也曽子弔於負夏主人既祖填池推柩而反之降婦人而后行禮按舊讀填池為奠徹文義未安胡氏以池為柩車上之池近之謂填為懸銅魚以實之文義亦未協魚躍拂池在池下非實於池中且負夏主人當是士士飾棺亦無銅魚又考儀禮飾棺在祖前即有魚豈待祖而後設乎愚疑填池即既夕禮所謂祖還車也柩車上有池象宫室之承霤禮云商祝飾柩一填池當讀如鎮或讀如奠填之為言鎮也故填星亦謂之鎮星鎮即有奠定之義前此柩遷於祖廟用輁軸正柩於堂上兩楹間既朝祖卻下以蜃車載於階間北首飾棺訖日昃時乃還轉柩車向外南首為行始謂之祖曽子弔當其時柩車巳還而鎮定所謂填池者也主人榮其弔復推柩而反使復北首若未祖者然先時婦人在堂降婦人即位於階間而后行弔禮如此釋之似可通古者賓弔婦人亦在位不避也舊說謂降婦人而后行禮為行遣奠之禮此記曽子來弔不必及弔後之事亦不必詳及降婦人近時新說謂填池為填殯坎殯坎名肂在殯宫固當填然與祖無涉祖在廟庭雖君來弔亦廟受主人必不因曽子而反柩於殯宫也曽子指子游而示人曰夫夫也為習於禮者如之何其裼裘而弔也按曽子示人之言是疑辭非私譏其失也但夫夫也語氣輕脫蓋記者失之耳和之而不和彈之而不成聲按和之之和釋文有兩音一音禾又或胡卧反今按當音禾吳氏謂調弦是也然以不成聲謂不終曲恐未確不成聲只是不成曲調耳樂由人心哉情未忘者調弦而不能調依曲調彈之而聲變不成曲調理固有之孔疏引家語及詩傳子夏援琴而弦衎衎而樂閔子騫援琴而弦切切而哀謂當以彼為正此說是幼名冠字五十以伯仲死諡周道也吳氏云冠而字少者但稱其字如顔淵宰我言游之類稍尊則字上加以其次如伯牛仲弓季路之類者艾而尊則上去其字止稱其次如單伯管仲孔叔南季之類所謂五十以伯仲者此也字下又加甫字如詩言仲山甫此極其尊敬之稱故祭之祝辭稱其皇祖皇考皆曰伯某甫士冠禮辭曰伯某甫者此要其終而言非謂冠後即如此稱之也按吳氏說詳而確哀公誄孔子稱尼甫則甫為尊稱冠時不以此稱之也要其終言之耳然云曰伯甫伯叔季唯其所當則冠時伯仲叔季之字亦當與其字連稱之其稱顔淵宰我言游者便文從省也又子為男女之美稱周人常以子配字學者行之按夫子答林放之問及從先進之言皆有反質之意練而祔則善殷即為學於孔子者行之亦無妨也君子曰謀人之軍師敗則死之謀人之邦邑危則亡之按晏子云君為社稷死則死之為社稷亡則亡之死亡誠有别矣然云謀人之邦邑亦泛論為臣者耳若宗臣與國同休戚如寧武子者正當身任其危豈可亡或非宗臣自度其材智可以拯危如燭之武者亦未可亡也蘧伯玉曰吾子樂之則瑗請前劉氏云吾子樂此則我請前行以去子矣示不欲與聞其事也吳氏云前猶云豫先也請前請為豫定其所若徇其意實譏非之所謂巽與之言也按請前之說劉氏得之吳氏說未必然近時新說謂伯玉欲先得此地若欲與之爭斯丘者以示已有貪心則人思爭奪之其言過巧恐非伯玉君子氣象也子游曰知禮鄭注嗤之按先儒說皆謂武叔失禮子游反言譏之有士喪禮可證也近時新設謂子游真許武叔知禮誤矣從母之夫舅之妻二夫人相為服君子未之言也或曰同㸑緦鄭注二夫人猶言此二人也時有此二人同居死相為服者甥居外家而非之張子云此是甥自幼居於從母之家或舅之家孤稚思養直如父母不可無服所以為此服也非是從母之夫與舅之妻相對為服吳氏云夫人謂妻之姊妹之子與從母之夫也謂夫之甥與舅之妻也見其二家有此二人者相為服禮之所無故曰君子未之言也按鄭注誤張子正之朱子與吳氏皆從之而陳氏集說載朱子說於後其自說仍用鄭注之說考之亦不詳矣嫂叔之無服也蓋推而逺之也按嫂叔無服唐太宗始采魏徴等議兄弟之妻及夫之兄弟皆制服小功後儒議論紛然或是古或是今或兩是之或酌古今之間而云當服心喪其說詳具文端公儀禮節略難以一言斷也程子云嫂叔所以無服只為無屬今之有服亦是豈有同居之親而可無服者後聖有作須是制服朱子云看推而逺之便是合有服但安排不得故推而逺之若有鞠養恩義心自住不得如何無服衆言淆亂折衷於程朱可也又按儀禮喪服記云夫之所為兄弟服妻降一等此謂外親兄弟也故賈疏以為當是夫之從母之類近世言禮者引此條謂此古者嫂叔有服之明證所謂沒其文於經補其說於記然則夫之兄弟降一等服大功乎誤矣文端公謂此後人杜撰勉齊經傳刪之者是亦未然黃氏喪禮以其無經可附也遂偶遺之非故刪之也愚編禮經綱目以此條附小功章從母丈夫婦人報之下從賈疏也因論嫂叔無服附及之南宫敬叔反必載寶而朝陳氏云載寶而朝欲行賂以求復位也吳氏云敬叔懲艾前事常以寶貨隨身雖每日朝君亦載寶貨倘被放逐則有寶貨不至貧乏也按陳氏說是公叔木有同母異父之昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也按異姓之服生於恩義之不可已如繼父同居者恩深服齊衰期繼父有子始同居後異居者恩次之服齊衰三月若素未嘗同居則繼父亦如路人無服矣繼父且無服而況同母異父之昆弟乎此記公叔木與狄儀之事狄儀則不可知若公叔木之同母異父昆弟則有可疑者公叔木為公叔文子之子文子為衛正卿文子卒其內子當不嫁於他人若曰木之母自他姓而來嫁也則文子豈娶再嫁之婦以為內子意木母賤或由他姓再嫁也是以有同母異父之昆弟其昆弟或從母而來鞠養於文子之家則恩出公叔氏公叔氏之子乃為之大功疑巳重矣如不從母鞠養則直為路人又何服之有乎先王制禮但制二種繼父之服而異父之昆弟不著服者謂其恩義之淺深難定也如其從母適人鞠養於繼父而與繼父之子亦如手足然則人情宜有所不能巳安得不為之服由繼父齊衰三月而差降之張子小功之說善矣游氏一斷以古禮謂不當有服其論雖正然未及乎恩義之不可巳而斟酌乎亡於禮者之禮亦未為盡善也又按先王制服固有一定之隆殺然後世人情日趨於薄則服制率矯而從於厚是亦所謂禮以義起也子思之母死於衛按嫁母異於出母喪服記但言為父後者為出母無服不言為父後者為嫁母無服而禮經父卒繼母嫁後猶為之齊衰杖期況於所生之母父卒而嫁豈可以為父後而忘其所由生乎此譙周袁準之說所本也吳氏譏其臆說過矣又按子思之母嫁於衛此事似未可臆斷也伯魚卒孔子又卒子思尚幼其母不能安室而適人宜亦有之母欲嫁雖有賢子能禦之乎觀凱風可知矣后木曰喪吾聞諸縣子曰夫喪不可不深長思也買棺外內易我死則亦然孔疏云此孝子所為之事非父母豫所屬託譏后木也朱文端公云慎終者人子之大節以教其子宜也孔氏以豫屬記為非未當按文端公說是讀賵曽子曰非古也是再告也鄭注曽子言喪禮袒而讀賵賓致命將行主人之史又讀賵所以存録之按古謂周以前周尚文柩將行有讀賵之禮所以存録之其時史坐而釋算亦為榮其多也子夏問諸夫子曰居君之母與妻之喪居處言語飲食衎爾按問當作聞猶速貧章問喪於夫子之問也此章之言記者蓋亦疑之是以特變文曰子夏聞諸夫子明其為傳聞之辭也若是子夏問辭當曰子夏問於孔子衎爾之下亦當有乎字若有問無答亦當記夫子不答賓客至無所館夫子曰生於我乎館死於我乎殯朱文端公云此即論語朋友死於我殯之意按賓客方至而遽言及死似非人情疑此即論語於我殯之言為朋友死無所歸者發記者傳聞遂異辭耳國子高曰葬也者藏也欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉按國高高其即楊朱所生伯成子高不以一毫利物舍國而耕於野者乎見列子擇不食之地以葬而不欲其封樹蓋恬淡寡欲而逹於生死者也子夏曰聖人之葬人與人之葬聖人也子何觀焉鄭注與及也孔疏云王肅云聖人葬人與屬上句以言若聖人葬人與則人庶有異聞若人之葬聖人與凡人何異而子何觀之按王肅說是今一日而三斬板而巳封尚行夫子之志乎哉長樂陳氏云孔子以時人之封過泰也故欲從其殺者門人以夫子之志於儉也故一日三斬板以行夫子之志門人於封則儉於披崇練旐則不儉者儉則行夫子之志以救時也不儉則行門人之志以尊師也按陳氏說亦善君復於小寢大寢小祖大祖庫門四郊孔疏云前曰廟後曰寢小寢高祖以下寢大寢謂天子始祖諸侯太祖也馬氏云小寢燕寢也大寢正寢也按路寢為王治事之處燕寢為王燕息之處君於廟與大門四郊皆復豈獨遺路寢燕寢乎周禮隸僕掌廟之五寢大喪復於小寢大寢亦謂路寢燕寢也馬氏說得之經文亦是由近而及逺也父母之喪哭無時使必知其反也朱文端公云經意謂父母之喪哭無時蓋念念不忘哀慕而他無足以分其心者惟君命不可違故輟哀而往然事復而反則必祭而哭告告之後無時之哭如故也按哭無時者常念親也使必知其反者如親存反必面也兩句不必連合又孔疏謂哭無時有三初喪哭不絶聲殯後廬中思憶則哭小祥後哀至而哭此所云謂小祥之後而陳氏集說兼殯後小祥言之陳說為長近世新說謂下句解上句非是黃氏喪禮此條編入喪禮義亦誤有殯聞逺兄弟之喪雖緦必往非兄弟雖鄰不往朱文端公云三年之喪不弔正謂不弔鄉鄰非兄弟之喪亦不往也雜記三年之喪雖功衰不弔如有服而將往哭之則服其服而往此經云雖緦必往正謂服其緦而往也又子張死曽子有母之喪齊衰有往哭之曰我弔也與哉蓋與哭死而非弔生也此云雖鄰不往以殯而未葬耳若卒哭而後弔生可以哭死烏容巳乎方氏之說未當按文端公之說甚善所識其兄弟不同居者皆弔按此經鄭孔為一說皇氏為一說皇氏說優吳氏從之然亦小異皇氏以所識其兄弟為句而吳氏以所識為句其兄弟不同居者為句吳氏說尤長孔氏謂連上有殯者甚誤上文云非兄弟雖鄰不往鄰獨非所識乎巳有殯乃舍殯而弔所識之喪於不同居之親可乎況喪亦無二主乎魯哀公誄孔立曰天不遺耆老莫相豫位焉嗚呼哀哉尼父鄭注誄其行以為諡也尼父因其字以為之諡按誄者哀死之辭與諡不同尼父者因其字而尊稱之耳注疏以為諡誤甚左氏傳所載誄辭傷煩且有稱余一人之失記者刪潤之如此孔子惡野哭者鄭注為其變衆孔疏云哭非其地曰野張子云為有服者之喪不哭諸家而哭於野是惡凶事也孔子惡野哭者謂此所知自當哭於野若奔喪安得不哭於道陳氏云所知吾哭諸野夫子嘗言之矣蓋哭其所知必設位而帷之以成禮此所惡者或郊野之際道路之間哭非其地又且倉卒行之使人疑駭故惡之也方氏說哭者呼滅子皋曰野哉孔子惡者以此恐未然按陳氏說善矣張子謂惡凶事亦或有之禮記訓義擇言卷二
