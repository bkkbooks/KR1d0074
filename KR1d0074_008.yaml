body:
  text: 禮記訓義擇言卷八婺源江永撰雜記上以其綏復按綏從鄭注讀為緌廬陵胡氏謂即上車之索非也其輤有裧鄭注輤載柩將殯之車飾也按輤者載柩車飾之總名諸侯以赤或取義於蒨大夫以下雖以白布而輤之名猶得達於下也大夫次於公館以終喪士練而歸士次於公館鄭注公館公宫之舍也練而歸之士謂邑宰也練而猶處公館朝廷之士也唯大夫三年無歸也朱文端公云士亦次公館但練而歸不如大夫以終喪按此文當云大夫士次於公館大夫以終喪士練而歸此先言士練而歸後言士次於公館者倒文耳古人屬辭往往有此非有兩士也鄭分邑宰之士朝廷之士是以辭害意矣假令士有異經文豈無别白而槩稱士乎竊疑古者方喪之禮雖致其隆居廬堊室朝夕哭泣亦惟在朝之卿大夫士耳邑宰有治民之責初喪哭臨後當還其本邑豈可俟練而歸曠廢一年之事乎文端公謂士皆朝廷之士俟練而歸當矣文端公説纂言本末載余見其親書刻本如此後條同又按公館者公宫之舍似與廬堊室有異疑卒哭以前居廬堊室既卒哭大夫士皆於公館治政事士則練而歸疏以大夫次公館即居廬恐未是又按喪大記公之喪大夫俟練士卒哭而歸其言公者即是國君注謂公士大夫有地者不然有地者既為大夫其臣為室老家相不稱大夫也與此經不同者記者所聞異耳三年之喪列國之君莫能行恐大夫練而歸士卒哭而歸者亦鮮矣況能公館終喪乎記者各述所聞宜其有不同也文端公説亦然大夫居廬士居堊室鄭注謂未練時也士居堊室亦謂邑宰朝廷之士居廬朱文端公云此士字及上節兩士字均謂朝廷之士注以為邑宰未當按文端公説是居廬堊室恐是哭泣以前廬堊室似與公館異後文云廬嚴者也大夫為其父母兄弟之未為大夫者之喪服如士服按此下數節先儒謂記禮者之失朱文端公論之云父母之喪無貴賤一周人貴賤其流弊乃施於尊親毛裏之恩不敵爵命之榮至春秋戰國覬覦攘奪骨肉仇讎其所由來者久矣此論尤為有見亦表記論三代皆有流弊之意論晏子粗衰斬事王肅與鄭異詳見注疏王氏説是大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮辨鄭注有司卜人也占者尊於有司卜求吉其服彌吉陸氏曰士冠禮筮日有司如主人服有司羣吏有事者也鄭氏謂卜人誤矣按注因下文史練冠長衣以筮故謂此經有司為卜人如鄭意則宰宗人等皆從主人喪服不變也然謂占者尊於卜人故皮辨恐不然占者即在卜人中如冠禮筮日士喪禮筮宅東面旅占皆是筮人與其屬共占士喪卜葬日旅占亦是卜人共占此占者皮辨下經占者朝服意卜人筮人中有主占者欲其得吉故純吉服與據士喪禮筮宅主人以下皆免絰卜葬日亦免絰族長涖卜及宗人吉服大夫之喪大宗人相小宗人命龜疏云大宗人大宗伯也小宗人小宗伯也劉氏云大宗人或是都宗人小宗人或是家宗人掌都家之禮者按大宗人若都家宗人君為大夫立者也小宗人大夫之家臣也周禮相卿大夫喪禮者肆師非大小宗伯也都宗人主都家宗人王家豈同來相大夫之喪乎少牢禮大夫自有宗人豈反不與命龜乎疏與劉氏説皆未確也大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然鄭注大夫之昆弟謂為士者也從其昭穆中一以上祖又祖而巳按大夫三廟適士二廟不得有髙祖又何得有髙祖之祖若拘於廟中附祭此禮之所必窮者祭法曰大夫顯考祖考無廟有禱焉為壇祭之去壇為鬼適士皇考無廟有禱焉為壇祭之去壇為鬼官師王考無廟而祭之去王考為鬼竊意無其廟而行附祭者當於壇中設位附之如此雖鬼以上亦可也鄭注祭法有大夫鬼其百世之説下經有父母之喪尚功衰而附兄弟之殤孔疏亦有立壇附小功兄弟之長殤於從祖之説或有引此經及小記中一以上而祔謂大夫士皆得祭及髙祖者是未考乎壇鬼之説也祭必於廟禱則於壇鬼則薦而不祭祔則雖鬼猶可祭於壇主妾之喪則自祔至於練祥皆使其子主之其殯祭不於正室鄭注祔自為之者以其祭於祖廟按以其祭於祖廟不可使子行祭鄭説似有理讀祔字為句以自為巳愚竊疑之凡經傳言自某至於某者皆以自為從自十有二月不雨至於秋七月自天子以至於庶人自恆山至於南河自啓至於反哭自今至於初吉此經自祔至於練祥文勢正同豈可以祔字為句謂自為巳乎詳經文之意蓋謂虞卒哭夫主之自祔以後皆使其子主之也虞卒哭喪祭之初親而哀之故自主之卒哭後哀殺故祔練祥皆子主也自祔至於練祥可不言則而云則者以其異於妻之喪祭皆自主也然則鄭説非與曰孔疏巳言之矣庾蔚云妾祖姑無廟為壇祭之鄭云於廟者崔氏云於廟中為壇祭之此謂攝女君若不攝女君之妾則不得為主别為壇不在祖廟中而子自主之也愚謂廟中為壇此崔氏圓鄭説其實非也廟中將以何地為壇乎凡妾祔妾祖姑無論攝女君與否皆别為壇祭之祭於壇經所謂其殯祭不於正室故子可主也然則婦之喪舅主祔何也曰婦者正體祔必於廟故夫若子不敢主而舅主也以此參證益知妾祔當子主也然則妾亦有無妾祖姑易牲而祔於女君者非夫自主與曰此又禮之變固當夫為主此經但言有妾祖姑者之常禮也此經句讀文義自鄭讀失之雖王子雍好攻鄭者亦莫能正蓋以其説近理不悟其非也違諸侯之大夫不反服違大夫之諸侯不反服按違諸侯疏謂不便其君或辟仇而去者是也如陳文子違齊之類若孔子去魯為道不行而以微罪去與此有間矣然其宗廟室家猶在魯定公之待之未至如子思孟子所言之甚則當酌於服與不服之間羇旅未為臣則反服他國為大夫則不服小功以下左鄭注左辟象吉輕也疏云縫同吉嚮左按喪冠右縫左縫皆縮縫也吉冠則橫縫不為左右辟小功以下左象他事吉尚左耳疏謂同吉似吉冠縫嚮左誤矣朝服十五升去其半而緦加灰錫也朱文端公云此弔服之緦非緦麻三月之緦三月之緦不治縷亦不治布按有事其縷無事其布曰緦喪服傳有明文弔服之緦衰亦即用此緦布故司服注鄭司農云緦布十五升去其半有事其縷無事其布而文端公之説如此未知何據且布縷亦不可謂之緦程栗也云士有緦服故以疑衰為弔服大夫以緦為弔服大白冠緇布之冠皆不蕤委武玄縞而后蕤鄭注不蕤質無飾也大白冠大古之布冠也委武冠卷也秦人曰委齊人曰武玄玄端也縞縞冠也疏云玄縞二冠既有先别卷後乃可蕤故云而后蕤也大祥縞冠亦有蕤何以知之前既云練冠亦條屬右縫則知縞不條屬既别安卷灼然有蕤也陸氏云委委貌也玄所謂縞冠玄武縞所謂玄冠縞武如是而后蕤先儒謂玄冠委貌也然則縞冠素委貌與素委貌蓋素端之冠按大白緇布之冠皆用布故不以蕤為飾玄冠用黑繒縞冠用絹故皆以蕤為飾非謂别安冠卷之故也注云不蕤質無飾可知文者乃有飾又云大白冠大古之布冠可知與緇布冠皆用布而玄冠則易之以繒縞冠則易之以絹也用繒用絹皆文故有飾也疏不善隅反徒求之於别安冠卷則大白緇布冠何嘗不别安冠卷乎此義不明後人不識玄冠與緇布冠之别似玄冠亦用布者如此則猶是緇布冠耳何云既冠可敝之乎陸氏欲破先儒委字乃謂縞冠玄武為玄玄冠縞武為縞豈不齒之服亦與正冠同論乎且所以名冠者在冠而不在武冠者武上之梁也又謂縞冠為素委貌亦非也素委貌者用白布為冠擬於大夫巳上之素爵辨士小斂以後未成服以前之冠亦庶人相弔之冠也縞冠者以生絹為冠以素為紕既祥之冠也著素委貌者服白布深衣非素端之冠也素端者大夫士札荒有所請禱之齊服殊深衣者也服素端者當著素冠素冠有緣異於素委貌者也吁古人衣冠之制後人迷眩久矣子羔之襲也繭衣裳與稅衣纁袡為一鄭注纊為繭縕為袍表之以稅衣乃為一稱爾稅衣若玄端而連衣裳者也大夫而以纁為之緣非也唯婦人纁袡按士喪禮陳襲事褖衣注云黑衣裳赤緣之謂之褖褖之言緣也所以表袍者也然則稅衣當用赤緣赤深纁淺子羔之家誤以纁代赤而不知其近於婦人始嫁之衣故曽子議其襲婦服非故以婦人衣襲子羔也此相禮者之過也客曰寡君使某如何不淑鄭注淑善也如何不善言若痛之甚使某弔按魯弔宋大水云若之何不弔言如何不為天所弔恤此如何不淑言如何遭此不善也注説未確含者坐委于殯東南有葦席既葬蒲席鄭注春秋有既葬歸含賵襚無譏焉按諸侯相弔而歸含賵襚邦交之禮也固非欲其周事之用也諸侯五日而殯此赴彼來近者亦數百里豈能及其含斂之日用其衣物哉故此經明言既葬蒲席見早晚皆可也若春秋隱元年書宰咺歸賵文五年書榮叔歸含且賵皆志王朝之禮以見魯之不往也而説者皆譏其緩矣鄭氏榖梁釋廢疾謂平王之歸賵晚者以其新遷原情免之若無事而晚者去來以譏之榮叔是也此曲徇榖梁之失又謂文九年秦人來歸僖公成風之襚以其殽敗兵無休時原情不責晚皆不若此注之完善宰夫朝服即喪屨疏云宰上卿也言夫衍字此遭喪巳久故嗣子親受禮宰著朝服若新始遭喪則主人不親受使大夫受於殯宫故聘禮云聘遭喪入境則遂也鄭云遭喪主國君薨也聘禮又云不筵几鄭云致命不於廟就尸柩於殯宫聘禮又云遭喪將命於大夫主人長衣練冠以受按聘是吉禮故嗣君凶服不可親受此為致含而來始遭喪正當親受疏乃引聘禮為説誤甚雜記下如三年之喪則既顈其練祥皆行鄭注言今之喪既服顈乃為前三年喪變除而練祥祭也此謂先有父母之服今又喪長子者其先有長子之服今又喪父母其禮亦然然則言未沒喪者巳練祥矣顈草名無葛之鄉去麻則用顈孔疏云依禮父在不為長子三年今云先有長子之服後又喪父母者庾氏熊氏並云有父者誤也當云後又喪母陸氏云禋而後顈顈吉服也知然者以被顈黼衣錦尚錦尚絅知之也三年重服故雖當既顈其練祥猶行吳氏曰古字聲同者多借用故檾麻之檾與單縠之褧並通作顈鄭氏以顈為代葛之檾是矣陸氏引詩儀禮皆婦人之服加於正服之上以禦道路之塵者至夫家則脫去豈可指為男子之吉服若欲言禫後吉服何不言玄端而乃言顈乎陸農師於禮注正救甚多但時或好新尚竒以破鄭説而不自知其失當也朱文端公云據舊説則與前父喪母死服除服卒事反喪服何異祥吉於練祥且可練何待言愚意此謂後喪未及卒哭值前喪練祥不得行至後喪變麻可補行也按鄭注今又喪父母誤言父庾氏熊氏巳正之矣其云言未沒喪者巳練祥矣語亦失檢前釋除服為祥祭之服既祥矣又何除焉當云巳練而未祥鄭氏説有未當者固俟後人救正然一以駁注見長好為新竒而不自知其紕繆如陸農師者正多也吳氏之説切中其失特録之鄭注言今之喪既服顈乃為前三年喪變除而練祥玩既字乃字之意本謂未顈以前值練祥不得行既顈乃行正如文端公後喪變麻可補行之説非謂既顈而值前喪一期再期也疏云後喪既顈之後其前喪須練祥祭皆舉行之亦是鄭注之意得文端公之説經義與注疏乃益明耳曾子問祭過時不祭疏熊氏引此文亦云追行前練祥祭也前經有父之喪如未沒喪而母死條孔疏云若母喪未葬而值父二祥則不得服其祥服所以爾者二祥之祭為吉未葬為凶故不忍凶時行吉禮也據此則未葬不可行二祥而二祥又不可終闕則變麻補行宜矣又下經言父母之喪將祭而昆弟死異宫者既殯而祭如同宫則雖臣妾葬而后祭夫同宫之臣妾猶輟祭以俟其葬而后祭則並有三年喪者可知矣又按大祥之後中月而禫經但言除服言練祥而不及禫豈禫祭玄冠玄衣黃裳有所不可行乎然則在喪而行大祥者前夕為期亦豈可朝服其以半凶半吉之服行之乎有殯聞外喪哭之他室入奠卒奠出改服即位如始即位之禮疏云外喪謂兄弟喪在逺者也卒奠而出改已重喪服著新死未成服之服即他室之位按外喪在遠得聞巳在成服之後而猶服未成服之服者謂如奔喪禮免絰即位三日五哭而后成服也則猶是與祭也鄭注猶亦當為由廬陵胡氏云猶是言自若也按胡氏説是也前經猶是附於王父及此經猶字鄭皆謂當為由以由為用非是子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服張子曰持喪敬則必哀哀則必瘠恣適非所以居喪稍不敬則哀忘之矣居喪以敬為上敬則一於禮也東滙陳氏説見集説按張子之言至矣此章陳氏之説亦甚善親喪外除兄弟之喪內除鄭注外除日月巳竟而哀未忘內除日月未竟而哀巳殺黃氏曰若日月未竟而哀先殺是不終喪也內除外除皆言日月巳竟服重者外雖除而內未除服輕者不唯外除而內亦除也按黃氏説甚善子遊曰既祥雖不當縞者必縞然後反服鄭注謂有以喪事贈賵來者雖不及時猶變服服祥祭之服以受之重其禮也其於此時始弔者則衛將軍文子之為之是矣反服反素縞麻衣也陸氏曰此言親喪雖既祥猶有他喪未除今以祥故無所不用縞縞既祥之服也然後反服反他喪之服朱文端公云注疏以縞為朝服縞冠之縞陸氏以縞為素縞麻衣之縞陸氏説較穩按陸氏説是雖不當縞謂有他服或喪冠或練冠不當服縞亦必素縞麻衣而後反他服即前經服其除服卒事反喪服之意所以正前喪之終也若既祥而有來贈賵者則屬辭不當如此注疏誤古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而后杖也按武叔見輪人褻用喪杖宜罰輪人禁戒庶民不得褻用斯善矣乃不許賤者用杖而禮由是變則杖期與不杖期何以别乎此武叔悖謬也冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而后設冒也按冒以韜尸上質下殺欲其藏之固也掩形似非本義然注謂人將惡之亦為衆人言耳非謂子自惡之也非為人喪問與賜與三年之喪以其喪拜非三年之喪以吉拜鄭云此上滅脫未聞其首云何是言非為人喪而問之與人喪而賜之與問遺也久無事曰問喪拜吉拜謂受問受賜者也稽顙而後拜曰喪拜拜而後稽顙曰吉拜疏曰平敵則問卑下則賜朱文端公云問如問疾非為喪而弔也賜與如遺酒肉非為喪而賵賻也於有喪之人而問之與賜與之其人而三年之喪也雖非為其喪而來其人亦必以喪拜拜之若非三年喪則吉拜吉拜謂依常拜賜之拜非拜而后稽顙之謂也問與與字如論語與命與仁之與按此經當從文端公説但兩與字仍當從舊讀音餘而問賜之義當從疏此記者自設問言有非為人喪而來問遺者與非為人喪而來賜物者與將何以拜謝之乎下言拜之之法也三年之喪重拜不可易非三年之喪可暫用吉拜受也相趨也出宫而退鄭注相趨謂相聞姓名來會喪事也東滙陳氏曰古人以趨示敬論語過之必趨左傳免胄趨風之類是也言此弔者與主人昔嘗有相趨之敬按陳氏説是以喪冠者雖三年之喪可也既冠於次入哭踊三者三乃出鄭注言雖者明齊衰以下皆可以冠也始遭喪以其冠月則喪服因冠矣非其冠月待變除卒哭而冠次廬也朱文端公云此為適長之為主人言喪服有衰有冠年巳及冠身為喪主可不冠而拜賓饋奠乎加以素冠賓以喪賓祝以盡哀盡禮入哭而告踊而出此禮之不易者疏謂非冠月遭喪必待受服而冠未當按適長為主人者固當因喪服而冠而曽子問孔子之言曰如將冠子未及期日而有齊衰大功小功之喪則因喪服而冠是不必為主人也大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦巳雖小功既卒哭可以冠取妻下殤之小功則不可張子曰父小功則是巳緦麻之末也故可以冠取蓋冠取者固巳無服矣范氏曰五服之制各有月數月數之內自無吉事故曰衰麻非所以接辨冕也雖輕喪之麻猶無昏姻之道而敦本敬始之義每於昏冠見之矣尋此二文為男女失時或繼嗣未立者爾非通例也東滙陳氏曰末服之將除也舊説以末為卒哭後然大功卒哭後尚有六月恐不可言末朱文端公云此為冠取失時者言故但言可以非謂禮當如是也按先王制禮吉凶不相干然禮有經亦有權假令五服及外親男女有數百則不虞之事時或有之況嫁取兼論壻家婦家之吉凶尤不可常如不問服之重輕必須父子皆無功緦之戚而後可行吉恐吉禮亦鮮有可行之時而男女失時嗣續不殖人道苦矣故禮為權制斷自大功以下凡服之重輕大約子降父一等大功之末子之小功巳除則可冠子嫁子小功之末子之緦麻巳除則并可取婦又有孤子尤不可失時者則小功既卒哭即許其自冠取皆禮之權也若下殤小功本從期降者則不許此為期以上防其相干猶是禮之經也凡服中行吉禮者暫易吉服事畢反其服以終喪冠以三加醴醮為正有因喪服而冠者不得巳也如身巳無服父有輕服未終則亦可以吉冠矣孤子小功末即可冠者為將取妻也小功卒哭後去除服兩月耳豈不可稍待而禮遽許其冠取者昏禮所謂恐有三族之不虞也父子亦有同服者若姑姊妹出適父子俱為大功從祖兄弟父子俱為小功此未及細論也鄭注有必偕祭乃行之説疏謂父子皆是大功之末乃得行冠嫁父子俱是小功之末乃可以嫁取此甚無謂如父大功小功之末子巳除服豈反不得行乎外宗為君夫人猶內宗也鄭注外宗為姑姊妹之女舅之女及從母皆是也按從母在邦人為小功報者今為君服斬疑太重蓋是從母之女與姑舅之女相等者耳服問疏引熊氏説謂從母之女疑此注脫之女二字若從母嫁於本國大夫當從為夫之君齊衰不杖期他國則無服疏又言卿大夫不外娶舅女及從母不得在國中然則此外宗唯有姑姊妹之女不兼舅之女與從母舅之女從母之女若嫁於他國與此君亦疏逺矣豈其夫不服而婦獨服乎疏並存熊氏及賀循譙周之説恐賀譙不服之説為是鄭亦云嫁於國中由此推之舅及從母之女在他國未嫁亦無與此君服斬之理至重之服豈可施於恩義所不逮成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣按爵辨士入廟之服諸侯之宰夫祝宗人當是下大夫而服爵辨者釁禮輕也助祭當冕服納幣一束束五兩兩五尋按此昏禮之幣一兩四丈一束二十丈若事神及賓禮之束帛皆用制幣制幣丈八尺為兩卷一束九丈女雖未許嫁年二十而筓禮之婦人執其禮燕則鬈首疏云許嫁而筓則主婦及女賔為筓禮未許嫁而筓婦人禮之無女賓不備儀也既未許嫁雖巳筓狷為少者處之朱文端公云婦人正詣主婦女賓雖未許嫁必以禮為之筓所以不待許嫁而筓者欲責以成人之道也而不備儀可乎燕則鬈首謂有事時則筓無事則不筓非既筓輒釋直待嫁而後筓也若云巳筓猶以少者處之是不以成人之道責之矣筓何為乎按文端公説是婦人執其禮對冠禮男女執其禮也禮記訓義擇言卷八
